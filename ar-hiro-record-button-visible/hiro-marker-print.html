<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hiroマーカー印刷</title>
  <style>
    @page { size: A4; margin: 0; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .toolbar {
      position: sticky;
      top: 0;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      z-index: 2;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      color: white;
      background: #2563eb;
      font-weight: 800;
      cursor: pointer;
    }
    .page {
      width: 210mm;
      height: 297mm;
      margin: 16px auto;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
    }
    .marker-wrap {
      width: 79mm;
      height: 79mm;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0.25mm dashed #cbd5e1;
    }
    img { width: 72mm; height: 72mm; display: block; }
    .note { text-align: center; font-size: 13px; color: #4b5563; padding-bottom: 20px; }
    @media print {
      body { background: white; }
      .toolbar, .note { display: none; }
      .page { margin: 0; box-shadow: none; width: 210mm; height: 297mm; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button onclick="window.print()">印刷する</button>
    <span>A4の約1/8サイズ / 印刷設定は100%推奨</span>
  </div>
  <main class="page">
    <div class="marker-wrap">
      <img alt="Hiro AR marker" src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" />
    </div>
  </main>
  <p class="note">紙が曲がると認識しにくいので、平らに置いて使ってください。</p>
</body>
</html>
