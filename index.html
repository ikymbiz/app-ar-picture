<style>
:root{color-scheme:dark}body{margin:0;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111}.panel{position:fixed;left:12px;right:12px;top:12px;z-index:10;background:rgba(0,0,0,.70);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:12px;color:#fff;box-shadow:0 8px 30px rgba(0,0,0,.25)}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}h1{margin:0 0 8px;font-size:18px}p{margin:6px 0;font-size:13px;line-height:1.45;opacity:.9}button,label.btn,select,input[type=range]{border:0;border-radius:999px;padding:8px 12px;font-weight:700;background:#fff;color:#111}label.btn{display:inline-flex;cursor:pointer}input[type=file]{display:none}.small{font-size:12px;opacity:.78}a{color:#9bd1ff}.hidden{display:none}.control{display:flex;align-items:center;gap:6px}.control input{width:115px}

<div class="panel" id="panel"><h1>動くお絵かきAR</h1>
<p>Hiroマーカーを映すと、魚またはクラゲが動きます。高さ・大きさはここで調整できます。</p>
<div class="row">
<label class="btn">自分の絵に変更<input id="file" type="file" accept="image/*"></label>
<select id="preset" title="絵"><option value="fish">魚</option><option value="jellyfish">クラゲ</option></select>
<select id="motion" title="動き"><option value="float">ふわふわ</option><option value="spin">くるくる</option><option value="jump">ぴょんぴょん</option><option value="swim">泳ぐ</option></select>
<span class="control small">大きさ <input id="scale" type="range" min="0.3" max="2.8" step="0.1" value="1.2"><b id="scaleVal">1.2</b></span>
<span class="control small">高さ <input id="height" type="range" min="0" max="1.6" step="0.05" value="0.25"><b id="heightVal">0.25</b></span>
<button id="hide">UIを隠す</button></div>
<p class="small">小さいHiroマーカーを印刷: <a href="hiro-marker-print.html" target="_blank" rel="noopener">印刷ページを開く</a></p></div>
<a-scene embedded vr-mode-ui="enabled:false" renderer="logarithmicDepthBuffer:true; antialias:true; alpha:true" arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;">
<a-assets><img id="drawingTexture" crossorigin="anonymous" src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22512%22%20height%3D%22512%22%20viewBox%3D%220%200%20512%20512%22%3E%0A%3Crect%20width%3D%22512%22%20height%3D%22512%22%20fill%3D%22none%22/%3E%3Cg%20stroke%3D%22%231d3557%22%20stroke-width%3D%2212%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%0A%3Cpath%20d%3D%22M120%20260%20C175%20150%20330%20150%20395%20255%20C330%20365%20175%20365%20120%20260%20Z%22%20fill%3D%22%23ffb703%22/%3E%0A%3Cpath%20d%3D%22M395%20255%20L470%20190%20L458%20255%20L470%20320%20Z%22%20fill%3D%22%23fb8500%22/%3E%0A%3Cpath%20d%3D%22M230%20175%20L275%2095%20L300%20185%20Z%22%20fill%3D%22%238ecae6%22/%3E%0A%3Cpath%20d%3D%22M235%20340%20L285%20420%20L305%20330%20Z%22%20fill%3D%22%238ecae6%22/%3E%0A%3Ccircle%20cx%3D%22165%22%20cy%3D%22235%22%20r%3D%2214%22%20fill%3D%22%231d3557%22%20stroke%3D%22none%22/%3E%0A%3Cpath%20d%3D%22M190%20292%20C225%20318%20270%20320%20310%20292%22%20fill%3D%22none%22/%3E%0A%3Cpath%20d%3D%22M255%20170%20C235%20220%20235%20295%20255%20345%22%20fill%3D%22none%22%20opacity%3D%22.55%22/%3E%0A%3Cpath%20d%3D%22M315%20190%20C290%20235%20290%20290%20315%20330%22%20fill%3D%22none%22%20opacity%3D%22.55%22/%3E%0A%3Ccircle%20cx%3D%22105%22%20cy%3D%22225%22%20r%3D%2210%22%20fill%3D%22%2390e0ef%22%20stroke%3D%22none%22%20opacity%3D%22.9%22/%3E%0A%3Ccircle%20cx%3D%2275%22%20cy%3D%22185%22%20r%3D%2214%22%20fill%3D%22%2390e0ef%22%20stroke%3D%22none%22%20opacity%3D%22.75%22/%3E%0A%3Ccircle%20cx%3D%2255%22%20cy%3D%22245%22%20r%3D%228%22%20fill%3D%22%2390e0ef%22%20stroke%3D%22none%22%20opacity%3D%22.7%22/%3E%0A%3C/g%3E%3C/svg%3E" /></a-assets>
<a-marker preset="hiro" smooth="true" smoothCount="8" smoothTolerance="0.01" smoothThreshold="5">
<a-entity id="drawing" geometry="primitive:plane;width:1;height:1" material="src:#drawingTexture; transparent:true; side:double; alphaTest:0.05" position="0 0.25 0" rotation="-90 0 0" scale="1.2 1.2 1.2" animation__float="property: position; dir: alternate; dur: 900; easing: easeInOutSine; loop: true; to: 0 0.55 0"></a-entity>
</a-marker><a-entity camera></a-entity></a-scene>
<script>
const PRESETS={fish:`data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22512%22%20height%3D%22512%22%20viewBox%3D%220%200%20512%20512%22%3E%0A%3Crect%20width%3D%22512%22%20height%3D%22512%22%20fill%3D%22none%22/%3E%3Cg%20stroke%3D%22%231d3557%22%20stroke-width%3D%2212%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%0A%3Cpath%20d%3D%22M120%20260%20C175%20150%20330%20150%20395%20255%20C330%20365%20175%20365%20120%20260%20Z%22%20fill%3D%22%23ffb703%22/%3E%0A%3Cpath%20d%3D%22M395%20255%20L470%20190%20L458%20255%20L470%20320%20Z%22%20fill%3D%22%23fb8500%22/%3E%0A%3Cpath%20d%3D%22M230%20175%20L275%2095%20L300%20185%20Z%22%20fill%3D%22%238ecae6%22/%3E%0A%3Cpath%20d%3D%22M235%20340%20L285%20420%20L305%20330%20Z%22%20fill%3D%22%238ecae6%22/%3E%0A%3Ccircle%20cx%3D%22165%22%20cy%3D%22235%22%20r%3D%2214%22%20fill%3D%22%231d3557%22%20stroke%3D%22none%22/%3E%0A%3Cpath%20d%3D%22M190%20292%20C225%20318%20270%20320%20310%20292%22%20fill%3D%22none%22/%3E%0A%3Cpath%20d%3D%22M255%20170%20C235%20220%20235%20295%20255%20345%22%20fill%3D%22none%22%20opacity%3D%22.55%22/%3E%0A%3Cpath%20d%3D%22M315%20190%20C290%20235%20290%20290%20315%20330%22%20fill%3D%22none%22%20opacity%3D%22.55%22/%3E%0A%3Ccircle%20cx%3D%22105%22%20cy%3D%22225%22%20r%3D%2210%22%20fill%3D%22%2390e0ef%22%20stroke%3D%22none%22%20opacity%3D%22.9%22/%3E%0A%3Ccircle%20cx%3D%2275%22%20cy%3D%22185%22%20r%3D%2214%22%20fill%3D%22%2390e0ef%22%20stroke%3D%22none%22%20opacity%3D%22.75%22/%3E%0A%3Ccircle%20cx%3D%2255%22%20cy%3D%22245%22%20r%3D%228%22%20fill%3D%22%2390e0ef%22%20stroke%3D%22none%22%20opacity%3D%22.7%22/%3E%0A%3C/g%3E%3C/svg%3E`,jellyfish:`data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22512%22%20height%3D%22512%22%20viewBox%3D%220%200%20512%20512%22%3E%0A%3Crect%20width%3D%22512%22%20height%3D%22512%22%20fill%3D%22none%22/%3E%0A%3Cg%20stroke%3D%22%235b2a86%22%20stroke-width%3D%2212%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%0A%3Cpath%20d%3D%22M120%20240%20C130%20130%20205%2080%20256%2080%20C320%2080%20390%20130%20398%20240%20C370%20270%20330%20285%20256%20285%20C184%20285%20145%20270%20120%20240%20Z%22%20fill%3D%22%23ffafcc%22/%3E%0A%3Cpath%20d%3D%22M138%20250%20C170%20222%20198%20222%20230%20250%20C260%20280%20308%20280%20376%20250%22%20fill%3D%22none%22%20opacity%3D%22.55%22/%3E%0A%3Ccircle%20cx%3D%22218%22%20cy%3D%22190%22%20r%3D%2211%22%20fill%3D%22%235b2a86%22%20stroke%3D%22none%22/%3E%0A%3Ccircle%20cx%3D%22294%22%20cy%3D%22190%22%20r%3D%2211%22%20fill%3D%22%235b2a86%22%20stroke%3D%22none%22/%3E%0A%3Cpath%20d%3D%22M225%20225%20C245%20238%20268%20238%20288%20225%22%20fill%3D%22none%22/%3E%0A%3Cpath%20d%3D%22M175%20285%20C135%20330%20165%20365%20130%20420%22%20fill%3D%22none%22/%3E%0A%3Cpath%20d%3D%22M220%20290%20C190%20350%20230%20380%20205%20445%22%20fill%3D%22none%22/%3E%0A%3Cpath%20d%3D%22M266%20290%20C245%20350%20285%20385%20265%20450%22%20fill%3D%22none%22/%3E%0A%3Cpath%20d%3D%22M312%20285%20C355%20335%20320%20375%20358%20430%22%20fill%3D%22none%22/%3E%0A%3Cpath%20d%3D%22M350%20278%20C405%20325%20365%20365%20412%20420%22%20fill%3D%22none%22/%3E%0A%3Ccircle%20cx%3D%22106%22%20cy%3D%22120%22%20r%3D%2212%22%20fill%3D%22%23bde0fe%22%20stroke%3D%22none%22%20opacity%3D%22.8%22/%3E%0A%3Ccircle%20cx%3D%22420%22%20cy%3D%22100%22%20r%3D%2218%22%20fill%3D%22%23bde0fe%22%20stroke%3D%22none%22%20opacity%3D%22.65%22/%3E%0A%3Ccircle%20cx%3D%22438%22%20cy%3D%22205%22%20r%3D%2210%22%20fill%3D%22%23bde0fe%22%20stroke%3D%22none%22%20opacity%3D%22.75%22/%3E%0A%3C/g%3E%3C/svg%3E`};
const fileInput=document.getElementById('file'),texture=document.getElementById('drawingTexture'),drawing=document.getElementById('drawing'),motion=document.getElementById('motion'),scale=document.getElementById('scale'),height=document.getElementById('height'),panel=document.getElementById('panel'),preset=document.getElementById('preset'),scaleVal=document.getElementById('scaleVal'),heightVal=document.getElementById('heightVal');
document.getElementById('hide').addEventListener('click',()=>panel.classList.toggle('hidden'));
function basePos(){return `0 ${height.value} 0`}function setBase(){drawing.setAttribute('position',basePos());}
function applyMotion(type){drawing.removeAttribute('animation__float');drawing.removeAttribute('animation__spin');drawing.removeAttribute('animation__jump');drawing.removeAttribute('animation__swim');setBase();drawing.setAttribute('rotation','-90 0 0');const h=parseFloat(height.value);if(type==='float')drawing.setAttribute('animation__float',`property: position; dir: alternate; dur: 900; easing: easeInOutSine; loop: true; to: 0 ${(h+0.30).toFixed(2)} 0`);else if(type==='spin')drawing.setAttribute('animation__spin','property: rotation; dur: 1800; easing: linear; loop: true; to: -90 360 0');else if(type==='jump')drawing.setAttribute('animation__jump',`property: position; dir: alternate; dur: 420; easing: easeOutQuad; loop: true; to: 0 ${(h+0.55).toFixed(2)} 0`);else drawing.setAttribute('animation__swim','property: position; dir: alternate; dur: 1200; easing: easeInOutSine; loop: true; to: 0.45 '+h.toFixed(2)+' 0');}
motion.addEventListener('change',e=>applyMotion(e.target.value));
scale.addEventListener('input',e=>{const s=e.target.value;scaleVal.textContent=s;drawing.setAttribute('scale',`${s} ${s} ${s}`);});
height.addEventListener('input',e=>{heightVal.textContent=e.target.value;applyMotion(motion.value);});
preset.addEventListener('change',e=>{texture.src=PRESETS[e.target.value];drawing.setAttribute('material','src','#drawingTexture');});
fileInput.addEventListener('change',async(event)=>{const file=event.target.files&&event.target.files[0];if(!file)return;const src=URL.createObjectURL(file);texture.onload=()=>{drawing.setAttribute('material','src','#drawingTexture');URL.revokeObjectURL(src);};texture.src=src;});
</script></body></html>
