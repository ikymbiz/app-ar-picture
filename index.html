<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>動くお絵かきAR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    :root {
      color-scheme: dark;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }


    #cameraMirror {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      width: 100dvw !important;
      height: 100vh !important;
      height: 100dvh !important;
      min-width: 100vw !important;
      min-height: 100vh !important;
      max-width: none !important;
      max-height: none !important;
      object-fit: cover !important;
      object-position: center center !important;
      transform: none !important;
      z-index: 0 !important;
      background: #000 !important;
      pointer-events: none !important;
    }
    .a-enter-vr,
    .a-enter-vr-button,
    button.a-enter-vr-button,
    [class*="a-enter-vr"],
    [title="Enter VR mode"],
    [title*="VR"] {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      width: 100dvw !important;
      height: 100vh !important;
      height: 100dvh !important;
      z-index: 1 !important;
      overflow: hidden !important;
      background: transparent !important;
    }
    canvas.a-canvas, .a-canvas {
      position: fixed !important;
      left: 0 !important;
      top: 0 !important;
      right: auto !important;
      bottom: auto !important;
      width: 100vw !important;
      width: 100dvw !important;
      height: 100vh !important;
      height: 100dvh !important;
      min-width: 100vw !important;
      min-height: 100vh !important;
      z-index: 2 !important;
      object-fit: cover !important;
      object-position: center center !important;
      background: transparent !important;
      transform: none !important;
    }
    video, #arjs-video, .arjs-video {
      position: fixed !important;
      left: 0 !important;
      top: 0 !important;
      right: auto !important;
      bottom: auto !important;
      width: 100vw !important;
      width: 100dvw !important;
      height: 100vh !important;
      height: 100dvh !important;
      min-width: 100vw !important;
      min-height: 100vh !important;
      object-fit: cover !important;
      object-position: center center !important;
      z-index: 0 !important;
      background: #000 !important;
      transform: none !important;
    }

    .ui {
      position: fixed;
      z-index: 20;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,.85);
    }

    .menu-button {
      top: calc(10px + var(--safe-top));
      right: 12px;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 999px;
      padding: 10px 15px;
      font-weight: 850;
      letter-spacing: .02em;
      color: #111;
      background: rgba(255,255,255,.92);
      box-shadow: 0 8px 24px rgba(0,0,0,.28);
      cursor: pointer;
      text-shadow: none;
    }

    .tiny-toast {
      top: calc(12px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 35;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .02em;
      background: rgba(0,0,0,.38);
      color: rgba(255,255,255,.82);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }
    .tiny-toast.show { opacity: 1; }

    .record-ui {
      pointer-events: none;
      left: 50%;
      bottom: calc(20px + var(--safe-bottom));
      transform: translateX(-50%);
      z-index: 32;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      text-align: center;
    }
    .record-button {
      pointer-events: auto;
      position: relative;
      width: 76px;
      height: 76px;
      padding: 0;
      border: 5px solid rgba(255,255,255,.95);
      border-radius: 999px;
      background: rgba(0,0,0,.16);
      box-shadow: 0 8px 26px rgba(0,0,0,.34);
      cursor: pointer;
      text-shadow: none;
    }
    .record-button::before {
      content: "";
      position: absolute;
      inset: 13px;
      border-radius: 999px;
      background: #ef1f1f;
      transition: all .16s ease;
    }
    .record-button.recording::before {
      inset: 20px;
      border-radius: 8px;
      background: #ef1f1f;
    }
    .record-label {
      font-size: 11px;
      font-weight: 850;
      opacity: .9;
    }

    .pad-wrap {
      pointer-events: auto;
      bottom: calc(24px + var(--safe-bottom));
      width: 126px;
      z-index: 28;
      pointer-events: auto;
    }
    .rotate-wrap {
      left: max(10px, env(safe-area-inset-left, 0px));
    }
    .size-wrap {
      right: max(10px, env(safe-area-inset-right, 0px));
    }
    .position-wrap { display: none !important; }

    .flip-control {
      margin-bottom: 7px;
      padding: 5px 7px 6px;
      border-radius: 14px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(3px);
    }
    .flip-control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 2px;
      font-size: 11px;
      font-weight: 850;
    }
    .flip-toggle {
      width: 100%;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 900;
      color: #111;
      background: rgba(255,255,255,.92);
      cursor: pointer;
      text-shadow: none;
      box-shadow: 0 5px 16px rgba(0,0,0,.22);
    }
    .flip-toggle.flipped {
      background: #fde68a;
    }

    .pad-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 4px;
      font-size: 11px;
      font-weight: 850;
      opacity: .95;
    }
    .pad-title button {
      border: 0;
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 10px;
      font-weight: 850;
      background: rgba(255,255,255,.9);
      color: #111;
      cursor: pointer;
      text-shadow: none;
    }
    .pad {
      position: relative;
      width: 126px;
      height: 126px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.32);
      background: rgba(0,0,0,.18);
      backdrop-filter: blur(3px);
      box-shadow: 0 12px 30px rgba(0,0,0,.30);
      overflow: hidden;
      touch-action: none;
    }
    .pad::before, .pad::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,.20);
      pointer-events: none;
    }
    .pad::before {
      left: 50%;
      top: 10px;
      bottom: 10px;
      width: 1px;
    }
    .pad::after {
      top: 50%;
      left: 10px;
      right: 10px;
      height: 1px;
    }
    .pad-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,.95);
      background: rgba(255,255,255,.32);
      box-shadow: 0 5px 18px rgba(0,0,0,.42);
      pointer-events: none;
    }
    .pad-caption {
      margin-top: 4px;
      min-height: 15px;
      font-size: 10px;
      font-weight: 800;
      text-align: center;
      opacity: .9;
    }

    #dragHitArea {
      position: fixed;
      z-index: 8;
      display: none;
      background: transparent;
      border-radius: 14px;
      touch-action: none;
      pointer-events: auto;
    }
    #dragHitArea.dragging {
      border: 1px dashed rgba(255,255,255,.65);
      background: rgba(255,255,255,.03);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 45;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(5px);
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(560px, 100%);
      max-height: min(82vh, 720px);
      overflow: auto;
      color: #fff;
      background: rgba(14,14,18,.94);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      box-shadow: 0 20px 70px rgba(0,0,0,.42);
      padding: 18px;
    }
    .modal-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    h1 { margin: 0 0 6px; font-size: 20px; }
    p { margin: 6px 0; font-size: 13px; line-height: 1.55; opacity: .9; }
    .section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.12);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
    }
    button, label.btn, select {
      border: 0;
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 750;
      background: #fff;
      color: #111;
      cursor: pointer;
      text-shadow: none;
    }
    label.btn { display: inline-flex; align-items: center; }
    input[type=file] { display: none; }
    select { min-width: 112px; }
    .small { font-size: 12px; opacity: .82; }
    .close-button {
      border: 0;
      border-radius: 999px;
      width: 36px;
      height: 36px;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      background: #fff;
      color: #111;
      cursor: pointer;
      flex: none;
    }
    .primary-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 9px 12px;
      background: #1d4ed8;
      color: white;
      text-decoration: none;
      font-weight: 800;
    }
    .danger { background: #e5e7eb; }

    #recordCanvas { display: none; }

    @media (max-width: 430px) {
      .pad-wrap { width: 108px; }
      .pad { width: 108px; height: 108px; border-radius: 20px; }
      .pad-knob { width: 24px; height: 24px; }
      .record-button { width: 70px; height: 70px; }
      .record-button::before { inset: 12px; }
      .record-button.recording::before { inset: 19px; }
    }
    @media (max-height: 650px) {
      .pad-wrap { bottom: calc(10px + var(--safe-bottom)); }
      .record-ui { bottom: calc(10px + var(--safe-bottom)); }
    }
  </style>
</head>
<body>
  <video id="cameraMirror" autoplay muted playsinline webkit-playsinline></video>
  <button class="ui menu-button" id="openMenu" type="button" aria-haspopup="dialog" aria-controls="menuModal">menu</button>
  <div class="ui tiny-toast" id="toast">Hiroを認識</div>
  <div id="dragHitArea" aria-label="絵をドラッグして位置調整"></div>

  <div class="ui pad-wrap position-wrap" aria-hidden="true" aria-label="Hiro基準の位置コントロール">
    <div class="pad-title"><span>位置 横/高さ</span><button id="resetPosition" type="button">戻す</button></div>
    <div class="pad" id="positionPad">
      <div class="pad-knob" id="positionKnob"></div>
    </div>
    <div class="pad-caption" id="positionCaption">横 0.0 / 高さ 1.0</div>
  </div>

  <div class="ui pad-wrap rotate-wrap" aria-label="回転コントロール">
    <div class="flip-control" aria-label="絵の向きコントロール">
      <div class="flip-control-row"><span>向き</span><span id="flipLabel">左向き</span></div>
      <button class="flip-toggle" id="flipToggle" type="button" aria-pressed="false">左右反転</button>
    </div>
    <div class="pad-title"><span>回転 X/Y</span><button id="resetRotation" type="button">戻す</button></div>
    <div class="pad" id="rotationPad">
      <div class="pad-knob" id="rotationKnob"></div>
    </div>
    <div class="pad-caption" id="rotationCaption">X 0° / Y 0°</div>
  </div>

  <div class="ui pad-wrap size-wrap" aria-label="サイズコントロール">
    <div class="pad-title"><span>幅 / 高さ</span><button id="resetSize" type="button">戻す</button></div>
    <div class="pad" id="sizePad">
      <div class="pad-knob" id="sizeKnob"></div>
    </div>
    <div class="pad-caption" id="sizeCaption">幅 1.0 / 高さ 1.0</div>
  </div>

  <div class="ui record-ui">
    <button class="record-button" id="recordButton" type="button" aria-label="録画開始"></button>
    <div class="record-label" id="recordLabel">録画開始</div>
  </div>

  <div class="modal-backdrop" id="menuModal" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
    <section class="modal">
      <div class="modal-header">
        <div>
          <h1 id="menuTitle">動くお絵かきAR</h1>
          <p>絵はHiroマーカーに追従します。画面を見ながら向き・回転・大きさ・位置を調整できます。</p>
        </div>
        <button class="close-button" id="closeMenu" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="section">
        <p class="small">絵を選ぶ</p>
        <div class="row">
          <select id="preset" title="絵">
            <option value="fish">魚</option>
            <option value="jellyfish">クラゲ</option>
          </select>
          <label class="btn">自分の絵に変更<input id="file" type="file" accept="image/*"></label>
        </div>
      </div>

      <div class="section">
        <p class="small">動き</p>
        <div class="row">
          <select id="motion" title="動き">
            <option value="float">ふわふわ</option>
            <option value="swim">泳ぐ</option>
            <option value="still">止める</option>
          </select>
        </div>
      </div>

      <div class="section">
        <div class="row">
          <a class="primary-link" href="hiro-marker-print.html" target="_blank" rel="noopener">Hiroを印刷</a>
          <button class="danger" id="resetAll" type="button">全部リセット</button>
        </div>
        <p class="small">録画は下部中央のボタンで開始・停止します。録画中も、回転・高さ・大きさ・位置の調整を続けられます。停止後、自動で保存されます。録画にUIは入りません。</p>
        <p class="small">MP4対応ブラウザではMP4、非対応時はWebMで保存します。マイク許可を出すと音声も入ります。</p>
      </div>
    </section>
  </div>

  <canvas id="recordCanvas"></canvas>

  <a-scene
    embedded
    vr-mode-ui="enabled:false"
    renderer="logarithmicDepthBuffer:true; antialias:true; alpha:true; preserveDrawingBuffer:true"
    arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;"
  >
    <a-assets>
      <img id="fishTexture" alt="" crossorigin="anonymous">
      <img id="jellyfishTexture" alt="" crossorigin="anonymous">
    </a-assets>

    <a-marker id="hiroMarker" preset="hiro" smooth="true" smoothCount="8" smoothTolerance="0.01" smoothThreshold="5">
      <a-entity id="artRoot" position="0 1 0">
        <a-entity id="motionGroup" position="0 0 0">
          <a-entity
            id="artPlane"
            geometry="primitive:plane; width:1.35; height:1"
            material="src:#fishTexture; transparent:true; side:double; alphaTest:0.03"
            rotation="-90 0 0"
          ></a-entity>
        </a-entity>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

<script>
const fishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#1d3557" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M115 260 C170 150 330 150 395 255 C330 365 170 365 115 260 Z" fill="#ffb703"/>
    <path d="M395 255 L472 188 L456 255 L472 322 Z" fill="#fb8500"/>
    <path d="M225 175 L275 92 L302 186 Z" fill="#8ecae6"/>
    <path d="M232 340 L285 420 L305 330 Z" fill="#8ecae6"/>
    <circle cx="165" cy="235" r="14" fill="#1d3557" stroke="none"/>
    <path d="M190 292 C225 318 270 320 310 292" fill="none"/>
    <path d="M255 170 C235 220 235 295 255 345" fill="none" opacity=".55"/>
    <path d="M315 190 C290 235 290 290 315 330" fill="none" opacity=".55"/>
    <circle cx="100" cy="225" r="10" fill="#90e0ef" stroke="none" opacity=".9"/>
    <circle cx="73" cy="184" r="14" fill="#90e0ef" stroke="none" opacity=".75"/>
    <circle cx="55" cy="245" r="8" fill="#90e0ef" stroke="none" opacity=".7"/>
  </g>
</svg>`;

const jellyfishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#5b2a86" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M118 240 C130 132 204 78 256 78 C323 78 388 130 398 240 C372 272 329 288 256 288 C184 288 144 272 118 240 Z" fill="#ffafcc"/>
    <path d="M139 250 C170 223 198 223 230 250 C260 280 308 280 376 250" fill="none" opacity=".55"/>
    <circle cx="218" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <circle cx="294" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <path d="M225 225 C245 238 268 238 288 225" fill="none"/>
    <path d="M175 286 C135 332 164 368 130 422" fill="none"/>
    <path d="M220 290 C190 350 230 382 205 448" fill="none"/>
    <path d="M266 290 C245 350 285 386 265 452" fill="none"/>
    <path d="M312 286 C356 336 320 377 358 432" fill="none"/>
    <path d="M350 278 C405 326 365 368 412 422" fill="none"/>
    <circle cx="106" cy="120" r="12" fill="#bde0fe" stroke="none" opacity=".8"/>
    <circle cx="420" cy="100" r="18" fill="#bde0fe" stroke="none" opacity=".65"/>
    <circle cx="438" cy="205" r="10" fill="#bde0fe" stroke="none" opacity=".75"/>
  </g>
</svg>`;

const state = {
  offsetX: 0,
  offsetY: 1,
  rotX: 0,
  rotY: 0,
  widthScale: 1.35,
  heightScale: 1,
  flipX: 1,
  baseRatio: 1,
  markerVisible: false,
  wasVisible: false,
  recording: false,
  recorder: null,
  chunks: [],
  mixedStream: null,
  micStream: null,
  recordLoop: 0,
  recordMime: '',
  recordExt: 'webm',
  stopRequested: false,
  recordStartAt: 0,
  lastToastAt: 0,
  motion: 'float'
};

const elements = {
  scene: document.querySelector('a-scene'),
  marker: document.getElementById('hiroMarker'),
  artRoot: document.getElementById('artRoot'),
  motionGroup: document.getElementById('motionGroup'),
  artPlane: document.getElementById('artPlane'),
  fishTexture: document.getElementById('fishTexture'),
  jellyfishTexture: document.getElementById('jellyfishTexture'),
  preset: document.getElementById('preset'),
  motion: document.getElementById('motion'),
  file: document.getElementById('file'),
  openMenu: document.getElementById('openMenu'),
  closeMenu: document.getElementById('closeMenu'),
  modal: document.getElementById('menuModal'),
  resetAll: document.getElementById('resetAll'),
  recordButton: document.getElementById('recordButton'),
  recordLabel: document.getElementById('recordLabel'),
  recordCanvas: document.getElementById('recordCanvas'),
  rotationPad: document.getElementById('rotationPad'),
  rotationKnob: document.getElementById('rotationKnob'),
  rotationCaption: document.getElementById('rotationCaption'),
  resetRotation: document.getElementById('resetRotation'),
  flipToggle: document.getElementById('flipToggle'),
  flipLabel: document.getElementById('flipLabel'),
  sizePad: document.getElementById('sizePad'),
  sizeKnob: document.getElementById('sizeKnob'),
  sizeCaption: document.getElementById('sizeCaption'),
  resetSize: document.getElementById('resetSize'),
  positionPad: document.getElementById('positionPad'),
  positionKnob: document.getElementById('positionKnob'),
  positionCaption: document.getElementById('positionCaption'),
  resetPosition: document.getElementById('resetPosition'),
  dragHitArea: document.getElementById('dragHitArea'),
  toast: document.getElementById('toast'),
  cameraMirror: document.getElementById('cameraMirror')
};

function clamp(n, min, max) {
  return Math.max(min, Math.min(max, n));
}

function svgToDataUri(svg) {
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

function setTextureImage(imgEl, svg) {
  imgEl.src = svgToDataUri(svg);
}

setTextureImage(elements.fishTexture, fishSvg);
setTextureImage(elements.jellyfishTexture, jellyfishSvg);

function showToast(message) {
  const now = performance.now();
  if (now - state.lastToastAt < 1200) return;
  state.lastToastAt = now;
  elements.toast.textContent = message;
  elements.toast.classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => elements.toast.classList.remove('show'), 850);
}

function openModal() {
  elements.modal.classList.add('open');
}

function closeModal() {
  elements.modal.classList.remove('open');
}

elements.openMenu.addEventListener('click', openModal);
elements.closeMenu.addEventListener('click', closeModal);
elements.modal.addEventListener('click', event => {
  if (event.target === elements.modal) closeModal();
});
window.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeModal();
});

function updateArtTransform() {
  elements.artRoot.setAttribute('position', `${state.offsetX.toFixed(3)} ${state.offsetY.toFixed(3)} 0`);
  elements.artPlane.setAttribute('rotation', `${(-90 + state.rotX).toFixed(2)} ${state.rotY.toFixed(2)} 0`);
  elements.artPlane.setAttribute('scale', `${state.flipX} 1 1`);
  elements.artPlane.setAttribute(
    'geometry',
    `primitive:plane; width:${state.widthScale.toFixed(3)}; height:${state.heightScale.toFixed(3)}`
  );

  const rotX = Math.round(state.rotX);
  const rotY = Math.round(state.rotY);
  elements.rotationCaption.textContent = `X ${rotX}° / Y ${rotY}°`;
  elements.sizeCaption.textContent = `幅 ${state.widthScale.toFixed(2)} / 高さ ${state.heightScale.toFixed(2)}`;
  elements.positionCaption.textContent = `横 ${state.offsetX.toFixed(1)} / 高さ ${state.offsetY.toFixed(1)}`;
  const flipped = state.flipX < 0;
  elements.flipLabel.textContent = flipped ? '右向き' : '左向き';
  elements.flipToggle.classList.toggle('flipped', flipped);
  elements.flipToggle.setAttribute('aria-pressed', flipped ? 'true' : 'false');
}



function setMotion(type) {
  state.motion = type;
  elements.motionGroup.removeAttribute('animation__float');
  elements.motionGroup.removeAttribute('animation__swim');

  if (type === 'float') {
    elements.motionGroup.setAttribute('animation__float', 'property: position; from: 0 -0.08 0; to: 0 0.28 0; dir: alternate; dur: 1100; easing: easeInOutSine; loop: true');
  } else if (type === 'swim') {
    elements.motionGroup.setAttribute('animation__swim', 'property: position; from: -0.22 0 0; to: 0.22 0 0; dir: alternate; dur: 1250; easing: easeInOutSine; loop: true');
  } else {
    elements.motionGroup.setAttribute('position', '0 0 0');
  }
}

elements.motion.addEventListener('change', event => setMotion(event.target.value));

elements.preset.addEventListener('change', event => {
  if (event.target.value === 'fish') {
    elements.artPlane.setAttribute('material', 'src:#fishTexture; transparent:true; side:double; alphaTest:0.03');
    state.widthScale = 1.35;
    state.heightScale = 1;
  } else {
    elements.artPlane.setAttribute('material', 'src:#jellyfishTexture; transparent:true; side:double; alphaTest:0.03');
    state.widthScale = 1.0;
    state.heightScale = 1.35;
  }
  syncSizeKnob();
  updateArtTransform();
});

elements.file.addEventListener('change', event => {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const ratio = img.width / img.height || 1;
      state.widthScale = clamp(ratio, 0.3, 3.0);
      state.heightScale = 1;
      elements.artPlane.setAttribute('material', {
        src: reader.result,
        transparent: true,
        side: 'double',
        alphaTest: 0.03
      });
      syncSizeKnob();
      updateArtTransform();
      closeModal();
    };
    img.onerror = () => alert('画像を読み込めませんでした。別の画像で試してください。');
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
});

function resetRotation() {
  state.rotX = 0;
  state.rotY = 0;
  syncRotationKnob();
  updateArtTransform();
}

function resetSize() {
  state.widthScale = elements.preset.value === 'jellyfish' ? 1.0 : 1.35;
  state.heightScale = elements.preset.value === 'jellyfish' ? 1.35 : 1.0;
  syncSizeKnob();
  updateArtTransform();
}

function resetPosition() {
  state.offsetX = 0;
  state.offsetY = 1;
  syncPositionKnob();
  updateArtTransform();
}

function resetAll() {
  resetPosition();
  resetRotation();
  state.flipX = 1;
  // 左右反転は標準向きに戻します。
  resetSize();
  setMotion(elements.motion.value);
  closeModal();
}

elements.resetRotation.addEventListener('click', resetRotation);
elements.flipToggle.addEventListener('click', () => {
  state.flipX = state.flipX < 0 ? 1 : -1;
  updateArtTransform();
});
elements.resetSize.addEventListener('click', resetSize);
elements.resetPosition.addEventListener('click', resetPosition);
elements.resetAll.addEventListener('click', resetAll);

function makePad(pad, knob, onValue) {
  let active = false;

  const setFromPointer = (event) => {
    const rect = pad.getBoundingClientRect();
    const x = clamp(((event.clientX - rect.left) / rect.width) * 2 - 1, -1, 1);
    const y = clamp(((event.clientY - rect.top) / rect.height) * 2 - 1, -1, 1);
    knob.style.left = `${((x + 1) / 2) * 100}%`;
    knob.style.top = `${((y + 1) / 2) * 100}%`;
    onValue(x, y);
  };

  pad.addEventListener('pointerdown', event => {
    active = true;
    pad.setPointerCapture(event.pointerId);
    setFromPointer(event);
  });
  pad.addEventListener('pointermove', event => {
    if (!active) return;
    setFromPointer(event);
  });
  pad.addEventListener('pointerup', event => {
    active = false;
    try { pad.releasePointerCapture(event.pointerId); } catch (_) {}
  });
  pad.addEventListener('pointercancel', () => { active = false; });
}

makePad(elements.rotationPad, elements.rotationKnob, (x, y) => {
  state.rotY = clamp(x * 80, -80, 80);
  state.rotX = clamp(-y * 80, -80, 80);
  updateArtTransform();
});

makePad(elements.positionPad, elements.positionKnob, (x, y) => {
  state.offsetX = clamp(x * 3.5, -3.5, 3.5);
  state.offsetY = clamp(2.75 - y * 3.25, -0.5, 6.0);
  updateArtTransform();
});

makePad(elements.sizePad, elements.sizeKnob, (x, y) => {
  state.widthScale = 0.25 + ((x + 1) / 2) * 2.75;
  state.heightScale = 0.25 + ((1 - y) / 2) * 2.75;
  updateArtTransform();
});

function syncRotationKnob() {
  const x = state.rotY / 80;
  const y = -state.rotX / 80;
  elements.rotationKnob.style.left = `${((x + 1) / 2) * 100}%`;
  elements.rotationKnob.style.top = `${((y + 1) / 2) * 100}%`;
}

function syncSizeKnob() {
  const x = ((state.widthScale - 0.25) / 2.75) * 2 - 1;
  const y = 1 - ((state.heightScale - 0.25) / 2.75) * 2;
  elements.sizeKnob.style.left = `${((clamp(x, -1, 1) + 1) / 2) * 100}%`;
  elements.sizeKnob.style.top = `${((clamp(y, -1, 1) + 1) / 2) * 100}%`;
}

function syncPositionKnob() {
  const x = clamp(state.offsetX / 3.5, -1, 1);
  const y = clamp((2.75 - state.offsetY) / 3.25, -1, 1);
  elements.positionKnob.style.left = `${((x + 1) / 2) * 100}%`;
  elements.positionKnob.style.top = `${((y + 1) / 2) * 100}%`;
}

function findArVideo() {
  return document.querySelector('video#arjs-video') ||
         Array.from(document.querySelectorAll('video.arjs-video, video')).find(video => video.id !== 'cameraMirror') ||
         null;
}

function findRecordingVideo() {
  return findArVideo() || elements.cameraMirror || null;
}

function findArCanvas() {
  return document.querySelector('canvas.a-canvas') ||
         elements.scene?.renderer?.domElement ||
         document.querySelector('canvas');
}

function setImportantStyle(el, styles) {
  if (!el) return;
  for (const [key, value] of Object.entries(styles)) {
    el.style.setProperty(key, value, 'important');
  }
}

function viewportSize() {
  const vv = window.visualViewport;
  const w = Math.ceil(Math.max(
    window.innerWidth || 0,
    document.documentElement.clientWidth || 0,
    vv ? vv.width : 0
  ));
  const h = Math.ceil(Math.max(
    window.innerHeight || 0,
    document.documentElement.clientHeight || 0,
    vv ? vv.height : 0
  ));
  return { w, h };
}

function syncCameraMirror(arVideo) {
  const mirror = elements.cameraMirror;
  if (!mirror || !arVideo) return;

  try {
    if (arVideo.srcObject && mirror.srcObject !== arVideo.srcObject) {
      mirror.srcObject = arVideo.srcObject;
    } else if (!arVideo.srcObject && arVideo.src && mirror.src !== arVideo.src) {
      mirror.src = arVideo.src;
    }
    mirror.muted = true;
    mirror.playsInline = true;
    mirror.setAttribute('playsinline', 'true');
    mirror.setAttribute('webkit-playsinline', 'true');
    const playResult = mirror.play();
    if (playResult && typeof playResult.catch === 'function') playResult.catch(() => {});
  } catch (_) {}
}

function hideVrButton() {
  const candidates = document.querySelectorAll('.a-enter-vr, .a-enter-vr-button, [class*="a-enter-vr"], [title*="VR"], [title="Enter VR mode"], button, div');
  for (const el of candidates) {
    const text = (el.textContent || '').trim();
    const title = (el.getAttribute && el.getAttribute('title')) || '';
    const cls = (el.className && String(el.className)) || '';
    if (cls.includes('a-enter-vr') || title.includes('VR') || title === 'Enter VR mode' || text === 'VR') {
      el.style.setProperty('display', 'none', 'important');
      el.style.setProperty('visibility', 'hidden', 'important');
      el.style.setProperty('opacity', '0', 'important');
      el.style.setProperty('pointer-events', 'none', 'important');
    }
  }
}

function forceFullscreenLayers() {
  hideVrButton();
  const { w, h } = viewportSize();
  const full = {
    position: 'fixed',
    left: '0px',
    top: '0px',
    right: 'auto',
    bottom: 'auto',
    width: `${w}px`,
    height: `${h}px`,
    'min-width': `${w}px`,
    'min-height': `${h}px`,
    'max-width': 'none',
    'max-height': 'none',
    margin: '0',
    transform: 'none'
  };

  setImportantStyle(elements.scene, {
    ...full,
    overflow: 'hidden',
    background: 'transparent',
    'z-index': '1'
  });

  const arVideo = findArVideo();
  syncCameraMirror(arVideo);

  // AR.js の内部 video はトラッキング用に残しつつ、表示は cameraMirror だけにします。
  // これで AR.js 側の contain 表示や計算幅による右端の黒帯を避けます。
  for (const video of document.querySelectorAll('video')) {
    video.setAttribute('playsinline', 'true');
    video.setAttribute('webkit-playsinline', 'true');
    if (video.id === 'cameraMirror') {
      setImportantStyle(video, {
        ...full,
        'object-fit': 'cover',
        'object-position': 'center center',
        'z-index': '0',
        opacity: '1',
        visibility: 'visible',
        background: '#000',
        'pointer-events': 'none'
      });
    } else {
      setImportantStyle(video, {
        ...full,
        'object-fit': 'cover',
        'object-position': 'center center',
        'z-index': '-2',
        opacity: '0',
        visibility: 'hidden',
        background: 'transparent',
        'pointer-events': 'none'
      });
    }
  }

  for (const canvas of document.querySelectorAll('canvas')) {
    if (canvas.id === 'recordCanvas') continue;
    setImportantStyle(canvas, {
      ...full,
      'object-fit': 'cover',
      'object-position': 'center center',
      'z-index': '2',
      background: 'transparent',
      'pointer-events': 'none'
    });
  }

  if (elements.scene && elements.scene.renderer) {
    try {
      elements.scene.renderer.setSize(w, h, false);
      elements.scene.renderer.setViewport(0, 0, w, h);
      elements.scene.renderer.setClearColor(0x000000, 0);
    } catch (_) {}
  }
}

function projectArtToScreen() {
  const sceneEl = elements.scene;
  if (!sceneEl || !sceneEl.camera || !elements.artRoot.object3D) return null;
  if (!state.markerVisible) return null;

  const world = new THREE.Vector3();
  elements.artRoot.object3D.getWorldPosition(world);
  world.project(sceneEl.camera);

  if (!Number.isFinite(world.x) || !Number.isFinite(world.y) || world.z < -1 || world.z > 1) return null;

  const cx = (world.x * 0.5 + 0.5) * window.innerWidth;
  const cy = (-world.y * 0.5 + 0.5) * window.innerHeight;

  const base = clamp(window.innerHeight * 0.18, 72, 210);
  const h = base * state.heightScale;
  const w = base * state.widthScale;

  return {
    left: cx - w / 2,
    top: cy - h / 2,
    width: Math.max(44, w),
    height: Math.max(44, h)
  };
}

function updateDragArea() {
  const rect = projectArtToScreen();
  if (!rect) {
    elements.dragHitArea.style.display = 'none';
    return;
  }
  elements.dragHitArea.style.display = 'block';
  elements.dragHitArea.style.left = `${rect.left}px`;
  elements.dragHitArea.style.top = `${rect.top}px`;
  elements.dragHitArea.style.width = `${rect.width}px`;
  elements.dragHitArea.style.height = `${rect.height}px`;
}

let dragState = null;
elements.dragHitArea.addEventListener('pointerdown', event => {
  dragState = {
    pointerId: event.pointerId,
    x: event.clientX,
    y: event.clientY,
    startOffsetX: state.offsetX,
    startOffsetY: state.offsetY
  };
  elements.dragHitArea.classList.add('dragging');
  elements.dragHitArea.setPointerCapture(event.pointerId);
});

elements.dragHitArea.addEventListener('pointermove', event => {
  if (!dragState || dragState.pointerId !== event.pointerId) return;
  const dx = event.clientX - dragState.x;
  const dy = event.clientY - dragState.y;
  const scale = 0.006;
  state.offsetX = clamp(dragState.startOffsetX + dx * scale, -3.5, 3.5);
  state.offsetY = clamp(dragState.startOffsetY - dy * scale, -0.5, 6.0);
  syncPositionKnob();
  updateArtTransform();
});

function endDrag(event) {
  if (!dragState) return;
  try { elements.dragHitArea.releasePointerCapture(event.pointerId); } catch (_) {}
  dragState = null;
  elements.dragHitArea.classList.remove('dragging');
}
elements.dragHitArea.addEventListener('pointerup', endDrag);
elements.dragHitArea.addEventListener('pointercancel', endDrag);

function markerVisibilityLoop() {
  forceFullscreenLayers();

  state.markerVisible = !!(elements.marker && elements.marker.object3D && elements.marker.object3D.visible);
  if (state.markerVisible !== state.wasVisible) {
    showToast(state.markerVisible ? 'Hiroを認識' : 'Hiroを見失いました');
    state.wasVisible = state.markerVisible;
  }
  updateDragArea();
  requestAnimationFrame(markerVisibilityLoop);
}

function drawCover(ctx, source, canvasWidth, canvasHeight) {
  const sw = source.videoWidth || source.width;
  const sh = source.videoHeight || source.height;
  if (!sw || !sh) return false;

  const sourceRatio = sw / sh;
  const targetRatio = canvasWidth / canvasHeight;
  let sx = 0, sy = 0, sWidth = sw, sHeight = sh;

  if (sourceRatio > targetRatio) {
    sWidth = sh * targetRatio;
    sx = (sw - sWidth) / 2;
  } else {
    sHeight = sw / targetRatio;
    sy = (sh - sHeight) / 2;
  }

  ctx.drawImage(source, sx, sy, sWidth, sHeight, 0, 0, canvasWidth, canvasHeight);
  return true;
}

function drawContainOverlay(ctx, source, canvasWidth, canvasHeight) {
  const sw = source.width;
  const sh = source.height;
  if (!sw || !sh) return;
  ctx.drawImage(source, 0, 0, sw, sh, 0, 0, canvasWidth, canvasHeight);
}

function pickRecordingMime() {
  const types = [
    'video/mp4;codecs=h264,aac',
    'video/mp4',
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm'
  ];
  const supported = types.find(type => window.MediaRecorder && MediaRecorder.isTypeSupported(type));
  state.recordMime = supported || '';
  state.recordExt = supported && supported.includes('mp4') ? 'mp4' : 'webm';
}

async function startRecording() {
  if (state.recording) return;
  const arVideo = findRecordingVideo();
  const arCanvas = findArCanvas();

  if (!arVideo || !arCanvas) {
    alert('録画に必要なAR映像が見つかりません。ページを再読み込みしてから試してください。');
    return;
  }

  pickRecordingMime();
  state.stopRequested = false;
  state.recordStartAt = performance.now();

  const w = Math.min(1280, Math.max(640, window.innerWidth));
  const h = Math.round(w * (window.innerHeight / window.innerWidth));
  elements.recordCanvas.width = w;
  elements.recordCanvas.height = h;
  const ctx = elements.recordCanvas.getContext('2d');

  let stopped = false;
  const renderFrame = () => {
    if (stopped) return;
    ctx.clearRect(0, 0, w, h);
    drawCover(ctx, arVideo, w, h);
    drawContainOverlay(ctx, arCanvas, w, h);
    state.recordLoop = requestAnimationFrame(renderFrame);
  };
  renderFrame();

  const videoStream = elements.recordCanvas.captureStream(30);
  const tracks = [...videoStream.getVideoTracks()];

  try {
    state.micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    tracks.push(...state.micStream.getAudioTracks());
  } catch (_) {
    state.micStream = null;
  }

  state.mixedStream = new MediaStream(tracks);
  state.chunks = [];

  try {
    const options = state.recordMime ? { mimeType: state.recordMime } : {};
    state.recorder = new MediaRecorder(state.mixedStream, options);
  } catch (error) {
    alert('このブラウザでは録画を開始できませんでした。別のブラウザで試してください。');
    stopped = true;
    state.stopRequested = false;
    return;
  }

  state.recorder.ondataavailable = event => {
    if (event.data && event.data.size > 0) state.chunks.push(event.data);
  };
  state.recorder.onstop = () => {
    // 停止ボタン以外でMediaRecorderが止まった場合は、自動ダウンロードせずUIを録画開始に戻します。
    // 実際の停止は stopRecording() からだけ行います。
    if (!state.stopRequested) {
      stopped = true;
      cancelAnimationFrame(state.recordLoop);
      if (state.micStream) state.micStream.getTracks().forEach(track => track.stop());
      if (state.mixedStream) state.mixedStream.getTracks().forEach(track => track.stop());
      state.recording = false;
      elements.recordButton.classList.remove('recording');
      elements.recordButton.setAttribute('aria-label', '録画開始');
      elements.recordLabel.textContent = '録画開始';
      showToast('録画が停止しました。もう一度開始してください');
      return;
    }

    stopped = true;
    cancelAnimationFrame(state.recordLoop);

    const mime = state.recordMime || 'video/webm';
    const blob = new Blob(state.chunks, { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().replace(/[:.]/g, '-');
    a.href = url;
    a.download = `ar-drawing-${stamp}.${state.recordExt}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);

    if (state.micStream) state.micStream.getTracks().forEach(track => track.stop());
    if (state.mixedStream) state.mixedStream.getTracks().forEach(track => track.stop());

    state.recording = false;
    state.stopRequested = false;
    elements.recordButton.classList.remove('recording');
    elements.recordButton.setAttribute('aria-label', '録画開始');
    elements.recordLabel.textContent = '録画開始';
  };

  // timesliceを指定すると一部ブラウザで短時間で停止することがあるため、
  // 明示的に停止ボタンが押されるまで録画を続けます。
  state.recorder.start();
  state.recording = true;
  // 録画中も各UIをそのまま操作できるよう、調整UIは無効化しません。
  elements.recordButton.classList.add('recording');
  elements.recordButton.setAttribute('aria-label', '録画停止');
  elements.recordLabel.textContent = '録画停止';
}

function stopRecording() {
  if (!state.recording || !state.recorder) return;
  // 誤タップやブラウザの連続clickで即停止しないよう、開始直後は停止を無視します。
  if (performance.now() - state.recordStartAt < 800) return;
  state.stopRequested = true;
  if (state.recorder.state !== 'inactive') {
    try { state.recorder.requestData(); } catch (_) {}
    state.recorder.stop();
  }
}

elements.recordButton.addEventListener('click', () => {
  if (state.recording) {
    stopRecording();
  } else {
    startRecording();
  }
});

window.addEventListener('resize', forceFullscreenLayers);
window.addEventListener('load', () => {
  updateArtTransform();
  setMotion('float');
  syncRotationKnob();
  syncSizeKnob();
  syncPositionKnob();
  markerVisibilityLoop();
});
</script>
</body>
</html>
