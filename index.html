<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>動くお絵かきAR - Hiro録画AR版</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    video,
    #arjs-video,
    .arjs-video,
    body > video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      min-width: 100vw !important;
      min-height: 100vh !important;
      max-width: none !important;
      max-height: none !important;
      object-fit: cover !important;
      margin: 0 !important;
      padding: 0 !important;
      transform: none !important;
      z-index: 0 !important;
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
      background: #000 !important;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 10 !important;
      pointer-events: none !important;
      background: transparent !important;
    }
    a-scene canvas,
    canvas.a-canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      background: transparent !important;
      opacity: 1 !important;
      pointer-events: none !important;
      z-index: 10 !important;
    }
    .a-enter-vr, .a-orientation-modal, .rs-base, .a-loader-title {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }

    .menu-button {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      right: calc(env(safe-area-inset-right, 0px) + 12px);
      z-index: 1000;
      border: 0;
      border-radius: 999px;
      padding: 10px 15px;
      font-weight: 900;
      color: #111;
      background: rgba(255,255,255,.92);
      box-shadow: 0 8px 24px rgba(0,0,0,.28);
      cursor: pointer;
      touch-action: manipulation;
    }

    .top-controls {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      left: calc(env(safe-area-inset-left, 0px) + 12px);
      right: calc(env(safe-area-inset-right, 0px) + 98px);
      z-index: 900;
      display: grid;
      gap: 6px;
      color: #fff;
      background: transparent;
      text-shadow: 0 2px 7px rgba(0,0,0,.95), 0 0 2px rgba(0,0,0,1);
      pointer-events: auto;
    }
    .caption {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      font-weight: 900;
      opacity: .92;
    }
    .h-control {
      display: grid;
      grid-template-columns: 56px minmax(100px, 1fr) 44px;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 850;
    }
    .h-control input { width: 100%; }
    .h-control b { text-align: right; font-variant-numeric: tabular-nums; }

    .right-height-control {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 88px);
      right: calc(env(safe-area-inset-right, 0px) + 10px);
      bottom: calc(env(safe-area-inset-bottom, 0px) + 138px);
      z-index: 900;
      width: 52px;
      display: grid;
      justify-items: center;
      align-items: center;
      grid-template-rows: auto 1fr auto;
      gap: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      background: transparent;
      pointer-events: auto;
      text-shadow: 0 2px 7px rgba(0,0,0,.95), 0 0 2px rgba(0,0,0,1);
    }
    .right-height-control input[type="range"] {
      width: 34px;
      height: min(54vh, 360px);
      writing-mode: vertical-lr;
      direction: rtl;
      -webkit-appearance: slider-vertical;
      appearance: slider-vertical;
      accent-color: #93c5fd;
    }
    .right-height-control b { font-variant-numeric: tabular-nums; }

    input[type="range"] {
      accent-color: #93c5fd;
      touch-action: none;
    }

    .record-dock {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
      transform: translateX(-50%);
      z-index: 1100;
      display: grid;
      place-items: center;
      gap: 6px;
      pointer-events: auto;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,.75);
    }
    .record-main {
      position: relative;
      width: 78px;
      height: 78px;
      border-radius: 999px;
      border: 5px solid rgba(255,255,255,.96);
      background: rgba(255,255,255,.22);
      box-shadow: 0 10px 34px rgba(0,0,0,.35);
      cursor: pointer;
      touch-action: manipulation;
      padding: 0;
      display: block;
    }
    .record-main::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 54px;
      height: 54px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: #ef4444;
      transition: width 140ms ease, height 140ms ease, border-radius 140ms ease, opacity 140ms ease;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }
    .record-main.recording::before {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      animation: recPulse 900ms ease-in-out infinite alternate;
    }
    @keyframes recPulse { from { opacity:.68; } to { opacity:1; } }
    .record-label {
      min-height: 16px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .02em;
    }

    .bottom-control {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 32px);
      z-index: 1050;
      width: min(30vw, 150px);
      min-width: 98px;
      display: grid;
      gap: 4px;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
      pointer-events: auto;
      text-shadow: 0 2px 7px rgba(0,0,0,.95), 0 0 2px rgba(0,0,0,1);
    }
    .bottom-control.left {
      right: calc(50% + 52px);
    }
    .bottom-control.right {
      left: calc(50% + 52px);
    }
    .bottom-control input { width: 100%; }
    .bottom-control b { font-variant-numeric: tabular-nums; }

    .save-video {
      display: none;
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 104px);
      transform: translateX(-50%);
      z-index: 1101;
      padding: 8px 13px;
      border-radius: 999px;
      color: #111;
      background: rgba(255,255,255,.94);
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 8px 24px rgba(0,0,0,.32);
      pointer-events: auto;
    }
    .save-video.ready { display: inline-flex; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,.52);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(560px, 100%);
      max-height: min(82vh, 720px);
      overflow: auto;
      color: #fff;
      background: rgba(14,14,18,.95);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      box-shadow: 0 20px 70px rgba(0,0,0,.44);
      padding: 18px;
    }
    .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    h1 { margin: 0 0 6px; font-size: 20px; }
    p { margin: 6px 0; font-size: 13px; line-height: 1.55; opacity: .9; }
    .close-button {
      border: 0;
      border-radius: 999px;
      width: 36px;
      height: 36px;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      background: #fff;
      color: #111;
      cursor: pointer;
      flex: none;
    }
    .section { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,.12); }
    .row { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; }
    button, label.btn, select, .primary-link {
      border: 0;
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 800;
      background: #fff;
      color: #111;
      cursor: pointer;
    }
    .primary-link { background: #2563eb; color: white; text-decoration: none; }
    .ghost-button { background: #e5e7eb; }
    label.btn { display: inline-flex; align-items: center; }
    input[type=file] { display: none; }
    select { min-width: 118px; }
    .small { font-size: 12px; opacity: .82; }

    #toast {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 64px);
      left: 50%;
      z-index: 1150;
      max-width: 250px;
      padding: 6px 10px;
      border-radius: 999px;
      color: rgba(255,255,255,.92);
      background: rgba(0,0,0,.32);
      border: 1px solid rgba(255,255,255,.10);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -4px);
      transition: opacity 220ms ease, transform 220ms ease;
      text-shadow: 0 1px 3px rgba(0,0,0,.65);
    }
    #toast.show { opacity: .68; transform: translate(-50%, 0); }
    #recordCanvas { display: none; }

    @media (max-width: 520px) {
      .top-controls { right: calc(env(safe-area-inset-right, 0px) + 88px); }
      .h-control { grid-template-columns: 48px minmax(64px, 1fr) 38px; gap: 6px; }
      .right-height-control { width: 48px; right: calc(env(safe-area-inset-right, 0px) + 5px); }
      .right-height-control input[type="range"] { height: min(52vh, 320px); }
      .record-main { width: 72px; height: 72px; }
      .record-main::before { width: 50px; height: 50px; }
      .bottom-control { width: min(28vw, 120px); min-width: 86px; }
      .bottom-control.left { right: calc(50% + 46px); }
      .bottom-control.right { left: calc(50% + 46px); }
    }
  </style>
  <script>
    AFRAME.registerComponent('keep-last-marker-pose', {
      schema: {
        marker: { type: 'selector' },
        anchor: { type: 'selector' }
      },
      init: function () {
        this.hasPose = false;
        this.position = new THREE.Vector3();
        this.quaternion = new THREE.Quaternion();
        window.addEventListener('reset-ar-pose', () => {
          this.hasPose = false;
          if (this.data.anchor && this.data.anchor.object3D) {
            this.data.anchor.object3D.visible = false;
          }
        });
      },
      tick: function () {
        const markerEl = this.data.marker;
        const anchorEl = this.data.anchor;
        if (!markerEl || !anchorEl || !markerEl.object3D || !anchorEl.object3D) return;

        if (markerEl.object3D.visible) {
          markerEl.object3D.updateMatrixWorld(true);
          markerEl.object3D.matrixWorld.decompose(this.position, this.quaternion, new THREE.Vector3());
          anchorEl.object3D.position.copy(this.position);
          anchorEl.object3D.quaternion.copy(this.quaternion);
          anchorEl.object3D.scale.set(1, 1, 1);
          anchorEl.object3D.visible = true;
          this.hasPose = true;
        } else if (this.hasPose) {
          anchorEl.object3D.visible = true;
        } else {
          anchorEl.object3D.visible = false;
        }
      }
    });
  </script>
</head>
<body>
  <div class="top-controls" aria-label="上部AR調整">
    <div class="caption"><span>横位置</span><span>Hiroに追従</span></div>
    <label class="h-control">横位置 <input id="offsetX" type="range" min="-4" max="4" step="0.05" value="0"><b id="offsetXVal">0.00</b></label>
  </div>

  <label class="right-height-control" aria-label="高さ調整">
    <span>高さ</span>
    <input id="height" type="range" min="0" max="6" step="0.05" value="1.0">
    <b id="heightVal">1.00</b>
  </label>

  <button class="menu-button" id="openMenu" type="button" aria-haspopup="dialog" aria-controls="menuModal">menu</button>

  <label class="bottom-control left" aria-label="回転調整">
    <span>回転</span>
    <input id="rotation" type="range" min="-180" max="180" step="1" value="0">
    <b id="rotationVal">0°</b>
  </label>

  <label class="bottom-control right" aria-label="大きさ調整">
    <span>大きさ</span>
    <input id="size" type="range" min="0.2" max="4" step="0.01" value="1.2">
    <b id="sizeVal">1.20</b>
  </label>

  <a id="downloadVideo" class="save-video" href="#" download="ar-drawing.mp4">動画を保存</a>
  <div class="record-dock" aria-label="録画操作">
    <button id="recordToggle" class="record-main" type="button" aria-label="録画開始"></button>
    <div id="recordStatus" class="record-label">タップで録画</div>
  </div>

  <div class="modal-backdrop" id="menuModal" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
    <section class="modal">
      <div class="modal-header">
        <div>
          <h1 id="menuTitle">動くお絵かきAR</h1>
          <p>絵はHiroマーカーに追従する3D ARオブジェクトです。録画はAR.jsのカメラ映像とARオブジェクトだけを合成して保存します。</p>
        </div>
        <button class="close-button" id="closeMenu" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="section">
        <p class="small">絵を選ぶ</p>
        <div class="row">
          <select id="preset" title="絵">
            <option value="fish">魚</option>
            <option value="jellyfish">クラゲ</option>
          </select>
          <label class="btn">自分の絵に変更<input id="file" type="file" accept="image/*"></label>
        </div>
      </div>

      <div class="section">
        <p class="small">動き</p>
        <div class="row">
          <select id="motion" title="動き">
            <option value="float">ふわふわ</option>
            <option value="swim">泳ぐ</option>
            <option value="spin">くるくる</option>
            <option value="jump">ぴょんぴょん</option>
            <option value="still">止める</option>
          </select>
        </div>
      </div>

      <div class="section">
        <div class="row">
          <a class="primary-link" href="hiro-marker-print.html" target="_blank" rel="noopener">Hiroを印刷</a>
          <button class="ghost-button" id="resetPose" type="button">表示位置をリセット</button>
        </div>
        <p class="small">録画終了後は自動で保存を開始します。MP4非対応のブラウザではWebMで保存します。</p>
      </div>
    </section>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>
  <canvas id="recordCanvas"></canvas>

  <a-scene
    embedded
    keep-last-marker-pose="marker:#hiroMarker; anchor:#lastAnchor"
    vr-mode-ui="enabled:false"
    renderer="alpha:true; antialias:true; logarithmicDepthBuffer:true"
    arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;"
  >
    <a-marker id="hiroMarker" preset="hiro" smooth="true" smoothCount="8" smoothTolerance="0.01" smoothThreshold="5"></a-marker>

    <a-entity id="lastAnchor" visible="false">
      <a-entity id="artworkPlacement" position="0 1.0 0" rotation="0 0 0">
        <a-entity id="motionGroup" position="0 0 0" rotation="0 0 0">
          <a-entity id="artworkSizer" scale="1.2 1.2 1.2">
            <a-plane
              id="drawing"
              width="1"
              height="1"
              material="transparent:true; side:double; alphaTest:0.03"
              rotation="0 0 0"
            ></a-plane>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-entity>

    <a-entity id="arCamera" camera></a-entity>
  </a-scene>

<script>
const fishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#1d3557" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M115 260 C170 150 330 150 395 255 C330 365 170 365 115 260 Z" fill="#ffb703"/>
    <path d="M395 255 L472 188 L456 255 L472 322 Z" fill="#fb8500"/>
    <path d="M225 175 L275 92 L302 186 Z" fill="#8ecae6"/>
    <path d="M232 340 L285 420 L305 330 Z" fill="#8ecae6"/>
    <circle cx="165" cy="235" r="14" fill="#1d3557" stroke="none"/>
    <path d="M190 292 C225 318 270 320 310 292" fill="none"/>
    <path d="M255 170 C235 220 235 295 255 345" fill="none" opacity=".55"/>
    <path d="M315 190 C290 235 290 290 315 330" fill="none" opacity=".55"/>
    <circle cx="100" cy="225" r="10" fill="#90e0ef" stroke="none" opacity=".9"/>
    <circle cx="73" cy="184" r="14" fill="#90e0ef" stroke="none" opacity=".75"/>
    <circle cx="55" cy="245" r="8" fill="#90e0ef" stroke="none" opacity=".7"/>
  </g>
</svg>`;

const jellyfishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#5b2a86" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M118 240 C130 132 204 78 256 78 C323 78 388 130 398 240 C372 272 329 288 256 288 C184 288 144 272 118 240 Z" fill="#ffafcc"/>
    <path d="M139 250 C170 223 198 223 230 250 C260 280 308 280 376 250" fill="none" opacity=".55"/>
    <circle cx="218" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <circle cx="294" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <path d="M225 225 C245 238 268 238 288 225" fill="none"/>
    <path d="M175 286 C135 332 164 368 130 422" fill="none"/>
    <path d="M220 290 C190 350 230 382 205 448" fill="none"/>
    <path d="M266 290 C245 350 285 386 265 452" fill="none"/>
    <path d="M312 286 C356 336 320 377 358 432" fill="none"/>
    <path d="M350 278 C405 326 365 368 412 422" fill="none"/>
    <circle cx="106" cy="120" r="12" fill="#bde0fe" stroke="none" opacity=".8"/>
    <circle cx="420" cy="100" r="18" fill="#bde0fe" stroke="none" opacity=".65"/>
    <circle cx="438" cy="205" r="10" fill="#bde0fe" stroke="none" opacity=".75"/>
  </g>
</svg>`;

const sceneEl = document.querySelector('a-scene');
const drawing = document.getElementById('drawing');
const artworkPlacement = document.getElementById('artworkPlacement');
const motionGroup = document.getElementById('motionGroup');
const artworkSizer = document.getElementById('artworkSizer');
const preset = document.getElementById('preset');
const motion = document.getElementById('motion');
const height = document.getElementById('height');
const offsetX = document.getElementById('offsetX');
const size = document.getElementById('size');
const rotation = document.getElementById('rotation');
const heightVal = document.getElementById('heightVal');
const offsetXVal = document.getElementById('offsetXVal');
const sizeVal = document.getElementById('sizeVal');
const rotationVal = document.getElementById('rotationVal');
const fileInput = document.getElementById('file');
const modal = document.getElementById('menuModal');
const openMenu = document.getElementById('openMenu');
const closeMenu = document.getElementById('closeMenu');
const resetPose = document.getElementById('resetPose');
const toastEl = document.getElementById('toast');
const recordToggle = document.getElementById('recordToggle');
const downloadVideo = document.getElementById('downloadVideo');
const recordStatus = document.getElementById('recordStatus');
const recordCanvas = document.getElementById('recordCanvas');
const recordCtx = recordCanvas.getContext('2d');

const state = {
  recorder: null,
  chunks: [],
  recording: false,
  videoUrl: null,
  audioContext: null,
  audioDestination: null,
  micStream: null,
  lastToastAt: 0,
};

function openModal() { modal.classList.add('open'); }
function closeModal() { modal.classList.remove('open'); }
openMenu.addEventListener('click', openModal);
closeMenu.addEventListener('click', closeModal);
modal.addEventListener('click', event => { if (event.target === modal) closeModal(); });
window.addEventListener('keydown', event => { if (event.key === 'Escape') closeModal(); });

function showToast(message) {
  const now = performance.now();
  if (now - state.lastToastAt < 1300) return;
  state.lastToastAt = now;
  toastEl.textContent = message;
  toastEl.classList.add('show');
  window.clearTimeout(showToast.timer);
  showToast.timer = window.setTimeout(() => toastEl.classList.remove('show'), 700);
}

function svgToDataUri(svg) {
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function setArtwork(src) {
  const img = await loadImage(src);
  const w = img.naturalWidth || img.width || 1;
  const h = img.naturalHeight || img.height || 1;
  const ratio = Math.max(0.01, w / h);
  drawing.setAttribute('width', String(ratio));
  drawing.setAttribute('height', '1');
  drawing.setAttribute('geometry', `primitive: plane; width: ${ratio}; height: 1`);
  drawing.setAttribute('material', {
    src,
    transparent: true,
    side: 'double',
    alphaTest: 0.03
  });
  applyMotion(motion.value);
}

async function setPreset(name) {
  await setArtwork(svgToDataUri(name === 'jellyfish' ? jellyfishSvg : fishSvg));
}

function values() {
  return {
    h: Number(height.value),
    x: Number(offsetX.value),
    s: Number(size.value),
    r: Number(rotation.value),
  };
}

function updateLabels() {
  const v = values();
  heightVal.textContent = v.h.toFixed(2);
  offsetXVal.textContent = v.x.toFixed(2);
  sizeVal.textContent = v.s.toFixed(2);
  rotationVal.textContent = `${Math.round(v.r)}°`;
}

function clearAnimations() {
  motionGroup.removeAttribute('animation__float');
  motionGroup.removeAttribute('animation__swim');
  motionGroup.removeAttribute('animation__spin');
  motionGroup.removeAttribute('animation__jump');
}

function setBaseTransform() {
  const v = values();
  updateLabels();
  artworkPlacement.setAttribute('position', `${v.x.toFixed(2)} ${v.h.toFixed(2)} 0`);
  artworkPlacement.setAttribute('rotation', `0 ${v.r.toFixed(1)} 0`);
  artworkSizer.setAttribute('scale', `${v.s.toFixed(3)} ${v.s.toFixed(3)} ${v.s.toFixed(3)}`);
  motionGroup.setAttribute('position', '0 0 0');
  motionGroup.setAttribute('rotation', '0 0 0');
}

function applyMotion(type) {
  clearAnimations();
  setBaseTransform();
  if (type === 'still') return;
  if (type === 'float') {
    motionGroup.setAttribute('animation__float', 'property: position; from: 0 0 0; to: 0 0.45 0; dir: alternate; dur: 1100; easing: easeInOutSine; loop: true');
  } else if (type === 'swim') {
    motionGroup.setAttribute('animation__swim', 'property: position; from: -0.35 0 0; to: 0.35 0 0; dir: alternate; dur: 1300; easing: easeInOutSine; loop: true');
  } else if (type === 'spin') {
    motionGroup.setAttribute('animation__spin', 'property: rotation; from: 0 0 0; to: 0 360 0; dur: 1800; easing: linear; loop: true');
  } else if (type === 'jump') {
    motionGroup.setAttribute('animation__jump', 'property: position; from: 0 0 0; to: 0 0.85 0; dir: alternate; dur: 520; easing: easeOutQuad; loop: true');
  }
}

[height, offsetX, size, rotation].forEach(input => input.addEventListener('input', () => applyMotion(motion.value)));
motion.addEventListener('change', event => applyMotion(event.target.value));
preset.addEventListener('change', event => setPreset(event.target.value));
fileInput.addEventListener('change', event => {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      await setArtwork(reader.result);
      closeModal();
    } catch (error) {
      alert('画像を読み込めませんでした。別の画像で試してください。');
    }
  };
  reader.readAsDataURL(file);
});
resetPose.addEventListener('click', () => {
  window.dispatchEvent(new Event('reset-ar-pose'));
  showToast('位置リセット');
  closeModal();
});

function setImportantStyle(el, prop, value) {
  if (el && el.style) el.style.setProperty(prop, value, 'important');
}

function forceFullscreenAr() {
  document.documentElement.style.setProperty('overflow', 'hidden', 'important');
  document.body.style.setProperty('overflow', 'hidden', 'important');

  document.querySelectorAll('video, #arjs-video, .arjs-video').forEach(video => {
    setImportantStyle(video, 'position', 'fixed');
    setImportantStyle(video, 'top', '0');
    setImportantStyle(video, 'left', '0');
    setImportantStyle(video, 'width', '100vw');
    setImportantStyle(video, 'height', '100vh');
    setImportantStyle(video, 'object-fit', 'cover');
    setImportantStyle(video, 'z-index', '0');
    setImportantStyle(video, 'display', 'block');
    setImportantStyle(video, 'visibility', 'visible');
    setImportantStyle(video, 'opacity', '1');
    video.setAttribute('playsinline', '');
    video.muted = true;
  });

  document.querySelectorAll('a-scene canvas, canvas.a-canvas').forEach(canvas => {
    setImportantStyle(canvas, 'position', 'fixed');
    setImportantStyle(canvas, 'inset', '0');
    setImportantStyle(canvas, 'width', '100vw');
    setImportantStyle(canvas, 'height', '100vh');
    setImportantStyle(canvas, 'background', 'transparent');
    setImportantStyle(canvas, 'opacity', '1');
    setImportantStyle(canvas, 'pointer-events', 'none');
    setImportantStyle(canvas, 'z-index', '10');
  });

  if (sceneEl && sceneEl.renderer) {
    try {
      sceneEl.renderer.setClearColor(0x000000, 0);
      sceneEl.renderer.setClearAlpha(0);
    } catch (error) {}
  }
}

function findArVideo() {
  const videos = Array.from(document.querySelectorAll('video'));
  return videos.find(v => (v.srcObject || v.videoWidth || v.id === 'arjs-video' || v.classList.contains('arjs-video'))) || null;
}

function findSceneCanvas() {
  return document.querySelector('a-scene canvas') || document.querySelector('canvas.a-canvas');
}

function resizeRecordCanvas() {
  const w = Math.max(1, window.innerWidth);
  const h = Math.max(1, window.innerHeight);
  if (recordCanvas.width !== w || recordCanvas.height !== h) {
    recordCanvas.width = w;
    recordCanvas.height = h;
  }
}

function drawVideoCover(ctx, video, w, h) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);
  if (!video || !video.videoWidth || !video.videoHeight) return;
  const vr = video.videoWidth / video.videoHeight;
  const cr = w / h;
  let sw = video.videoWidth;
  let sh = video.videoHeight;
  let sx = 0;
  let sy = 0;
  if (vr > cr) {
    sw = video.videoHeight * cr;
    sx = (video.videoWidth - sw) / 2;
  } else {
    sh = video.videoWidth / cr;
    sy = (video.videoHeight - sh) / 2;
  }
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, w, h);
}

function drawRecordFrame() {
  resizeRecordCanvas();
  const w = recordCanvas.width;
  const h = recordCanvas.height;
  recordCtx.setTransform(1, 0, 0, 1, 0, 0);
  drawVideoCover(recordCtx, findArVideo(), w, h);
  const sceneCanvas = findSceneCanvas();
  if (sceneCanvas) {
    try {
      recordCtx.drawImage(sceneCanvas, 0, 0, w, h);
    } catch (error) {}
  }
}

function loop() {
  forceFullscreenAr();
  if (state.recording) drawRecordFrame();
  requestAnimationFrame(loop);
}

function supportedMimeType() {
  const options = [
    'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
    'video/mp4;codecs=h264,aac',
    'video/mp4',
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm'
  ];
  return options.find(type => window.MediaRecorder && MediaRecorder.isTypeSupported(type)) || '';
}

function setRecordState(mode) {
  if (mode === 'recording') {
    recordToggle.classList.add('recording');
    recordToggle.setAttribute('aria-label', '録画停止');
    recordStatus.textContent = '録画中';
    downloadVideo.classList.remove('ready');
  } else if (mode === 'ready') {
    recordToggle.classList.remove('recording');
    recordToggle.setAttribute('aria-label', '録画開始');
    recordStatus.textContent = '保存しました';
    downloadVideo.classList.add('ready');
  } else {
    recordToggle.classList.remove('recording');
    recordToggle.setAttribute('aria-label', '録画開始');
    recordStatus.textContent = 'タップで録画';
    downloadVideo.classList.remove('ready');
  }
}

async function setupAudioMixer(recordingStream) {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return;
  const ctx = new AudioContextClass();
  await ctx.resume();
  const dest = ctx.createMediaStreamDestination();
  state.audioContext = ctx;
  state.audioDestination = dest;
  dest.stream.getAudioTracks().forEach(track => recordingStream.addTrack(track));

  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    try {
      state.micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: true
        },
        video: false
      });
      const micSource = ctx.createMediaStreamSource(state.micStream);
      micSource.connect(dest);
      showToast('音声あり');
    } catch (error) {
      showToast('マイクなしで録画');
    }
  }
}

function playShutterSound() {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return;
  const ctx = state.audioContext || new AudioContextClass();
  if (!state.audioContext) state.audioContext = ctx;
  ctx.resume();

  const now = ctx.currentTime;
  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gain = ctx.createGain();
  osc1.type = 'square';
  osc2.type = 'triangle';
  osc1.frequency.setValueAtTime(880, now);
  osc1.frequency.exponentialRampToValueAtTime(260, now + 0.08);
  osc2.frequency.setValueAtTime(1320, now + 0.03);
  osc2.frequency.exponentialRampToValueAtTime(420, now + 0.12);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.22, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(ctx.destination);
  if (state.audioDestination) gain.connect(state.audioDestination);
  osc1.start(now);
  osc2.start(now + 0.03);
  osc1.stop(now + 0.18);
  osc2.stop(now + 0.18);
}

function cleanupAudio() {
  if (state.micStream) {
    state.micStream.getTracks().forEach(track => track.stop());
    state.micStream = null;
  }
  if (state.audioContext) {
    state.audioContext.close().catch(() => {});
    state.audioContext = null;
    state.audioDestination = null;
  }
}

function autoDownload(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => a.remove(), 0);
}

async function startRecording() {
  if (!window.MediaRecorder || !recordCanvas.captureStream) {
    alert('このブラウザでは録画に対応していません。Android Chrome / Edge で試してください。');
    return;
  }
  const video = findArVideo();
  if (!video || !video.videoWidth || !video.videoHeight) {
    alert('カメラ映像の準備中です。少し待ってからもう一度押してください。');
    return;
  }
  if (state.videoUrl) {
    URL.revokeObjectURL(state.videoUrl);
    state.videoUrl = null;
  }
  downloadVideo.href = '#';
  downloadVideo.classList.remove('ready');
  state.chunks = [];
  resizeRecordCanvas();
  drawRecordFrame();

  const canvasStream = recordCanvas.captureStream(30);
  const recordingStream = new MediaStream(canvasStream.getVideoTracks());
  await setupAudioMixer(recordingStream);

  const mimeType = supportedMimeType();
  const options = mimeType ? { mimeType } : undefined;
  try {
    state.recorder = new MediaRecorder(recordingStream, options);
  } catch (error) {
    cleanupAudio();
    alert('録画を開始できませんでした。別のブラウザで試してください。');
    return;
  }
  state.recorder.ondataavailable = event => {
    if (event.data && event.data.size) state.chunks.push(event.data);
  };
  state.recorder.onstop = () => {
    const type = state.chunks[0]?.type || mimeType || 'video/webm';
    const isMp4 = type.includes('mp4');
    const ext = isMp4 ? 'mp4' : 'webm';
    const filename = `ar-drawing-${new Date().toISOString().replace(/[:.]/g, '-')}.${ext}`;
    const blob = new Blob(state.chunks, { type });
    state.videoUrl = URL.createObjectURL(blob);
    downloadVideo.href = state.videoUrl;
    downloadVideo.download = filename;
    state.recording = false;
    cleanupAudio();
    setRecordState('ready');
    autoDownload(state.videoUrl, filename);
    if (!isMp4) showToast('MP4非対応のためWebM保存');
  };

  state.recording = true;
  state.recorder.start(200);
  setRecordState('recording');
  playShutterSound();
}

function stopRecording() {
  if (state.recorder && state.recorder.state !== 'inactive') {
    state.recorder.stop();
  }
  state.recording = false;
}

recordToggle.addEventListener('click', () => {
  if (state.recording) stopRecording();
  else startRecording();
});

window.addEventListener('resize', resizeRecordCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeRecordCanvas, 250));
sceneEl.addEventListener('loaded', forceFullscreenAr);
sceneEl.addEventListener('renderstart', forceFullscreenAr);
new MutationObserver(forceFullscreenAr).observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'class'] });
window.setInterval(forceFullscreenAr, 500);

updateLabels();
setPreset('fish');
setRecordState('idle');
requestAnimationFrame(loop);
</script>
</body>
</html>
