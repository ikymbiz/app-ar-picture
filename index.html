<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>動くお絵かきAR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      touch-action: none;
    }
    a { color: #9bd1ff; }
    .menu-button {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 40;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 999px;
      padding: 10px 15px;
      font-weight: 800;
      letter-spacing: .02em;
      color: #111;
      background: rgba(255,255,255,.94);
      box-shadow: 0 8px 24px rgba(0,0,0,.28);
      cursor: pointer;
    }
    .live-controls {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 35;
      color: #fff;
      background: rgba(7, 10, 18, .72);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 18px;
      padding: 10px 12px 12px;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 36px rgba(0,0,0,.35);
    }
    .live-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 5px;
      font-size: 12px;
      font-weight: 800;
      opacity: .9;
    }
    .live-title span:last-child {
      font-weight: 650;
      opacity: .72;
    }
    .control {
      display: grid;
      grid-template-columns: 64px 1fr 48px;
      width: 100%;
      gap: 8px;
      align-items: center;
      padding: 5px 0;
      font-size: 13px;
    }
    .control input { width: 100%; }
    .control b { text-align: right; font-variant-numeric: tabular-nums; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 45;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(5px);
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(560px, 100%);
      max-height: min(82vh, 720px);
      overflow: auto;
      color: #fff;
      background: rgba(14,14,18,.94);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      box-shadow: 0 20px 70px rgba(0,0,0,.42);
      padding: 18px;
    }
    .modal-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    h1 { margin: 0 0 6px; font-size: 20px; }
    p { margin: 6px 0; font-size: 13px; line-height: 1.55; opacity: .9; }
    .close-button {
      border: 0;
      border-radius: 999px;
      width: 36px;
      height: 36px;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      background: #fff;
      color: #111;
      cursor: pointer;
      flex: none;
    }
    .section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.12);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
    }
    button, label.btn, select {
      border: 0;
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 750;
      background: #fff;
      color: #111;
    }
    button, label.btn, select { cursor: pointer; }
    label.btn { display: inline-flex; align-items: center; }
    input[type=file] { display: none; }
    select { min-width: 112px; }
    .small { font-size: 12px; opacity: .82; }
    .primary-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 9px 12px;
      background: #1d4ed8;
      color: white;
      text-decoration: none;
      font-weight: 800;
    }
    .ghost-button { background: #e5e7eb; }
    @media (max-height: 640px) {
      .live-controls { padding: 8px 10px; }
      .control { grid-template-columns: 56px 1fr 44px; padding: 3px 0; font-size: 12px; }
      .live-title { margin-bottom: 2px; }
    }
  </style>
  <script>
    AFRAME.registerComponent('keep-last-marker-pose', {
      schema: {
        marker: { type: 'selector' },
        anchor: { type: 'selector' }
      },
      init: function () {
        this.hasPose = false;
        this.position = new THREE.Vector3();
        this.quaternion = new THREE.Quaternion();
        window.addEventListener('reset-ar-pose', () => {
          this.hasPose = false;
          if (this.data.anchor && this.data.anchor.object3D) {
            this.data.anchor.object3D.visible = false;
          }
        });
      },
      tick: function () {
        const markerEl = this.data.marker;
        const anchorEl = this.data.anchor;
        if (!markerEl || !anchorEl || !markerEl.object3D || !anchorEl.object3D) return;

        if (markerEl.object3D.visible) {
          markerEl.object3D.updateMatrixWorld(true);

          // Hiroの見え方や検出ズレで matrixWorld の scale が揺れることがあるため、
          // ここでは位置と回転だけを取得します。縮尺は常に固定です。
          markerEl.object3D.matrixWorld.decompose(this.position, this.quaternion, new THREE.Vector3());
          anchorEl.object3D.position.copy(this.position);
          anchorEl.object3D.quaternion.copy(this.quaternion);
          anchorEl.object3D.scale.set(1, 1, 1);
          anchorEl.object3D.visible = true;
          this.hasPose = true;
        } else if (!this.hasPose) {
          anchorEl.object3D.visible = false;
        } else {
          anchorEl.object3D.visible = true;
        }
      }
    });
  </script>
</head>
<body>
  <button class="menu-button" id="openMenu" type="button" aria-haspopup="dialog" aria-controls="menuModal">menu</button>

  <div class="live-controls" aria-label="AR画像の調整">
    <div class="live-title"><span>AR調整</span><span>画面を見ながら調整</span></div>
    <label class="control">高さ <input id="height" type="range" min="0" max="8" step="0.1" value="1.0"><b id="heightVal">1.0</b></label>
    <label class="control">横 <input id="offsetX" type="range" min="-4" max="4" step="0.05" value="0"><b id="offsetXVal">0.00</b></label>
    <label class="control">大きさ <input id="size" type="range" min="0.2" max="4" step="0.05" value="1.2"><b id="sizeVal">1.20</b></label>
    <label class="control">回転 <input id="yaw" type="range" min="-180" max="180" step="1" value="0"><b id="yawVal">0°</b></label>
  </div>

  <div class="modal-backdrop" id="menuModal" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
    <section class="modal">
      <div class="modal-header">
        <div>
          <h1 id="menuTitle">動くお絵かきAR</h1>
          <p>Hiroマーカーを映すと、魚・クラゲ・自分の絵が動きます。調整は画面下のスライダーで、ARを見ながら行えます。</p>
        </div>
        <button class="close-button" id="closeMenu" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="section">
        <p class="small">絵を選ぶ</p>
        <div class="row">
          <select id="preset" title="絵">
            <option value="fish">魚</option>
            <option value="jellyfish">クラゲ</option>
          </select>
          <label class="btn">自分の絵に変更<input id="file" type="file" accept="image/*"></label>
        </div>
      </div>

      <div class="section">
        <p class="small">動き</p>
        <div class="row">
          <select id="motion" title="動き">
            <option value="float">ふわふわ</option>
            <option value="swim">泳ぐ</option>
            <option value="spin">くるくる</option>
            <option value="jump">ぴょんぴょん</option>
            <option value="still">止める</option>
          </select>
        </div>
      </div>

      <div class="section">
        <div class="row">
          <a class="primary-link" href="hiro-marker-print.html" target="_blank" rel="noopener">Hiroを印刷</a>
          <button class="ghost-button" id="resetPose" type="button">表示位置をリセット</button>
        </div>
        <p class="small">Hiroを見失っても通知は出しません。画像は最後に認識した位置に残ります。もう一度Hiroを映すと位置だけ更新され、縮尺は変わりません。</p>
      </div>
    </section>
  </div>

  <a-scene
    embedded
    keep-last-marker-pose="marker:#hiroMarker; anchor:#lastAnchor"
    vr-mode-ui="enabled:false"
    renderer="logarithmicDepthBuffer:true; antialias:true; alpha:true"
    arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;"
  >
    <a-marker id="hiroMarker" preset="hiro" smooth="true" smoothCount="8" smoothTolerance="0.01" smoothThreshold="5"></a-marker>

    <a-entity id="lastAnchor" visible="false">
      <a-entity id="artworkGroup" position="0 1.0 0" rotation="0 0 0" scale="1.2 1.2 1.2">
        <a-entity
          id="drawing"
          geometry="primitive:plane; width:1; height:1"
          material="transparent:true; side:double; alphaTest:0.03"
          rotation="-90 0 0"
        ></a-entity>
      </a-entity>
    </a-entity>

    <a-entity camera></a-entity>
  </a-scene>

<script>
const fishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#1d3557" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M115 260 C170 150 330 150 395 255 C330 365 170 365 115 260 Z" fill="#ffb703"/>
    <path d="M395 255 L472 188 L456 255 L472 322 Z" fill="#fb8500"/>
    <path d="M225 175 L275 92 L302 186 Z" fill="#8ecae6"/>
    <path d="M232 340 L285 420 L305 330 Z" fill="#8ecae6"/>
    <circle cx="165" cy="235" r="14" fill="#1d3557" stroke="none"/>
    <path d="M190 292 C225 318 270 320 310 292" fill="none"/>
    <path d="M255 170 C235 220 235 295 255 345" fill="none" opacity=".55"/>
    <path d="M315 190 C290 235 290 290 315 330" fill="none" opacity=".55"/>
    <circle cx="100" cy="225" r="10" fill="#90e0ef" stroke="none" opacity=".9"/>
    <circle cx="73" cy="184" r="14" fill="#90e0ef" stroke="none" opacity=".75"/>
    <circle cx="55" cy="245" r="8" fill="#90e0ef" stroke="none" opacity=".7"/>
  </g>
</svg>`;

const jellyfishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#5b2a86" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M118 240 C130 132 204 78 256 78 C323 78 388 130 398 240 C372 272 329 288 256 288 C184 288 144 272 118 240 Z" fill="#ffafcc"/>
    <path d="M139 250 C170 223 198 223 230 250 C260 280 308 280 376 250" fill="none" opacity=".55"/>
    <circle cx="218" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <circle cx="294" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <path d="M225 225 C245 238 268 238 288 225" fill="none"/>
    <path d="M175 286 C135 332 164 368 130 422" fill="none"/>
    <path d="M220 290 C190 350 230 382 205 448" fill="none"/>
    <path d="M266 290 C245 350 285 386 265 452" fill="none"/>
    <path d="M312 286 C356 336 320 377 358 432" fill="none"/>
    <path d="M350 278 C405 326 365 368 412 422" fill="none"/>
    <circle cx="106" cy="120" r="12" fill="#bde0fe" stroke="none" opacity=".8"/>
    <circle cx="420" cy="100" r="18" fill="#bde0fe" stroke="none" opacity=".65"/>
    <circle cx="438" cy="205" r="10" fill="#bde0fe" stroke="none" opacity=".75"/>
  </g>
</svg>`;


const drawing = document.getElementById('drawing');
const artworkGroup = document.getElementById('artworkGroup');
const anchor = document.getElementById('lastAnchor');
const preset = document.getElementById('preset');
const motion = document.getElementById('motion');
const height = document.getElementById('height');
const offsetX = document.getElementById('offsetX');
const size = document.getElementById('size');
const yaw = document.getElementById('yaw');
const heightVal = document.getElementById('heightVal');
const offsetXVal = document.getElementById('offsetXVal');
const sizeVal = document.getElementById('sizeVal');
const yawVal = document.getElementById('yawVal');
const fileInput = document.getElementById('file');
const modal = document.getElementById('menuModal');
const openMenu = document.getElementById('openMenu');
const closeMenu = document.getElementById('closeMenu');
const resetPose = document.getElementById('resetPose');

const textureCache = {};

function openModal() {
  modal.classList.add('open');
}

function closeModal() {
  modal.classList.remove('open');
}

openMenu.addEventListener('click', openModal);
closeMenu.addEventListener('click', closeModal);
modal.addEventListener('click', event => {
  if (event.target === modal) closeModal();
});
window.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeModal();
});

function svgToDataUri(svg) {
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

function imageToPngDataUrl(src, maxSize = 1024) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const ratio = img.width / img.height || 1;
      let w, h;
      if (ratio >= 1) {
        w = maxSize;
        h = Math.max(1, Math.round(maxSize / ratio));
      } else {
        h = maxSize;
        w = Math.max(1, Math.round(maxSize * ratio));
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      resolve({ dataUrl: canvas.toDataURL('image/png'), ratio });
    };
    img.onerror = reject;
    img.src = src;
  });
}

async function setArtworkFromSvg(name, svg) {
  if (!textureCache[name]) {
    textureCache[name] = await imageToPngDataUrl(svgToDataUri(svg));
  }
  setArtworkTexture(textureCache[name].dataUrl, textureCache[name].ratio);
}

function setArtworkTexture(src, ratio = 1) {
  const width = ratio >= 1 ? 1 : ratio;
  const planeHeight = ratio >= 1 ? 1 / ratio : 1;
  drawing.setAttribute('geometry', `primitive:plane; width:${width}; height:${planeHeight}`);
  drawing.setAttribute('material', {
    src,
    transparent: true,
    side: 'double',
    alphaTest: 0.03
  });
  applyMotion(motion.value);
}

function values() {
  return {
    x: parseFloat(offsetX.value),
    h: parseFloat(height.value),
    s: parseFloat(size.value),
    r: parseFloat(yaw.value)
  };
}

function updateLabels() {
  const v = values();
  heightVal.textContent = v.h.toFixed(1);
  offsetXVal.textContent = v.x.toFixed(2);
  sizeVal.textContent = v.s.toFixed(2);
  yawVal.textContent = `${Math.round(v.r)}°`;
}

function clearAnimations() {
  artworkGroup.removeAttribute('animation__float');
  artworkGroup.removeAttribute('animation__swim');
  artworkGroup.removeAttribute('animation__spin');
  artworkGroup.removeAttribute('animation__jump');
}

function setBaseTransform() {
  const v = values();
  updateLabels();
  artworkGroup.setAttribute('position', `${v.x.toFixed(2)} ${v.h.toFixed(2)} 0`);
  // 絵の縦横比を壊さないため、X/Y/Zを同じ値で拡大縮小します。
  artworkGroup.setAttribute('scale', `${v.s.toFixed(3)} ${v.s.toFixed(3)} ${v.s.toFixed(3)}`);
  artworkGroup.setAttribute('rotation', `0 ${v.r.toFixed(1)} 0`);
}

function applyMotion(type) {
  clearAnimations();
  setBaseTransform();
  const v = values();

  if (type === 'still') {
    return;
  }
  if (type === 'float') {
    artworkGroup.setAttribute('animation__float', `property: position; from: ${v.x.toFixed(2)} ${v.h.toFixed(2)} 0; to: ${v.x.toFixed(2)} ${(v.h + 0.45).toFixed(2)} 0; dir: alternate; dur: 1100; easing: easeInOutSine; loop: true`);
  } else if (type === 'swim') {
    artworkGroup.setAttribute('animation__swim', `property: position; from: ${v.x.toFixed(2)} ${v.h.toFixed(2)} 0; to: ${(v.x + 0.65).toFixed(2)} ${v.h.toFixed(2)} 0; dir: alternate; dur: 1300; easing: easeInOutSine; loop: true`);
  } else if (type === 'spin') {
    artworkGroup.setAttribute('animation__spin', `property: rotation; from: 0 ${v.r.toFixed(1)} 0; to: 0 ${(v.r + 360).toFixed(1)} 0; dur: 1800; easing: linear; loop: true`);
  } else if (type === 'jump') {
    artworkGroup.setAttribute('animation__jump', `property: position; from: ${v.x.toFixed(2)} ${v.h.toFixed(2)} 0; to: ${v.x.toFixed(2)} ${(v.h + 0.85).toFixed(2)} 0; dir: alternate; dur: 520; easing: easeOutQuad; loop: true`);
  }
}

preset.addEventListener('change', async (event) => {
  if (event.target.value === 'fish') {
    await setArtworkFromSvg('魚', fishSvg);
  } else {
    await setArtworkFromSvg('クラゲ', jellyfishSvg);
  }
});

motion.addEventListener('change', event => applyMotion(event.target.value));
[height, offsetX, size, yaw].forEach(input => {
  input.addEventListener('input', () => applyMotion(motion.value));
});

fileInput.addEventListener('change', async (event) => {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const texture = await imageToPngDataUrl(reader.result);
      setArtworkTexture(texture.dataUrl, texture.ratio);
    } catch (error) {
      alert('画像を読み込めませんでした。別の画像で試してください。');
    }
  };
  reader.readAsDataURL(file);
});

resetPose.addEventListener('click', () => {
  window.dispatchEvent(new Event('reset-ar-pose'));
  closeModal();
});

window.addEventListener('load', () => {
  updateLabels();
  setArtworkFromSvg('魚', fishSvg);
});
</script>
</body>
</html>
