<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>動くお絵かきAR - Hiro全画面録画版</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* AR.jsのカメラ映像を1枚だけ、必ず画面いっぱいに広げる */
    video,
    #arjs-video,
    .arjs-video,
    body > video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      min-width: 100vw !important;
      min-height: 100vh !important;
      max-width: none !important;
      max-height: none !important;
      object-fit: cover !important;
      margin: 0 !important;
      padding: 0 !important;
      transform: none !important;
      z-index: 0 !important;
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
      background: #000 !important;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 2 !important;
      pointer-events: none !important;
      background: transparent !important;
    }
    a-scene canvas,
    canvas.a-canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      background: transparent !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
    .a-enter-vr, .a-orientation-modal, .rs-base, .a-loader-title {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }

    #artCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 20;
      pointer-events: none;
      background: transparent;
    }

    .menu-button {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      right: calc(env(safe-area-inset-right, 0px) + 12px);
      z-index: 1000;
      border: 0;
      border-radius: 999px;
      padding: 10px 15px;
      font-weight: 900;
      color: #111;
      background: rgba(255,255,255,.92);
      box-shadow: 0 8px 24px rgba(0,0,0,.28);
      cursor: pointer;
      touch-action: manipulation;
    }

    /* 上: 高さ・横位置 */
    .top-controls {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      left: calc(env(safe-area-inset-left, 0px) + 10px);
      right: calc(env(safe-area-inset-right, 0px) + 96px);
      z-index: 900;
      display: grid;
      gap: 5px;
      color: #fff;
      background: transparent;
      text-shadow: 0 2px 6px rgba(0,0,0,.9), 0 0 2px rgba(0,0,0,.95);
      pointer-events: auto;
    }
    .top-controls .caption {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      font-weight: 900;
      opacity: .9;
    }
    .h-control {
      display: grid;
      grid-template-columns: 56px minmax(90px, 1fr) 46px;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 800;
    }
    .h-control input { width: 100%; }
    .h-control b { text-align: right; font-variant-numeric: tabular-nums; }

    /* 右: 大きさ・回転 */
    .right-controls {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 96px);
      right: calc(env(safe-area-inset-right, 0px) + 8px);
      bottom: calc(env(safe-area-inset-bottom, 0px) + 132px);
      z-index: 900;
      width: 86px;
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 8px;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,.9), 0 0 2px rgba(0,0,0,.95);
      pointer-events: auto;
    }
    .v-control {
      min-width: 36px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      justify-items: center;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 850;
      background: transparent;
    }
    .v-control b { font-variant-numeric: tabular-nums; font-size: 11px; }
    .v-control input[type="range"] {
      width: 32px;
      height: min(46vh, 260px);
      writing-mode: vertical-lr;
      direction: rtl;
      -webkit-appearance: slider-vertical;
      appearance: slider-vertical;
      accent-color: #93c5fd;
    }

    input[type="range"] {
      accent-color: #93c5fd;
      touch-action: none;
    }

    /* 下中央: カメラアプリ風録画ボタン */
    .record-dock {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      transform: translateX(-50%);
      z-index: 1100;
      display: grid;
      justify-items: center;
      gap: 8px;
      pointer-events: auto;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,.75);
    }
    .record-main {
      width: 76px;
      height: 76px;
      border-radius: 999px;
      border: 5px solid rgba(255,255,255,.92);
      background: rgba(255,255,255,.24);
      box-shadow: 0 10px 34px rgba(0,0,0,.34);
      display: grid;
      place-items: center;
      cursor: pointer;
      touch-action: manipulation;
    }
    .record-main::before {
      content: "";
      width: 54px;
      height: 54px;
      border-radius: 999px;
      background: #ef4444;
      transition: all 140ms ease;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }
    .record-main.recording::before {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: #ef4444;
      animation: recPulse 900ms ease-in-out infinite alternate;
    }
    @keyframes recPulse { from { opacity:.68; } to { opacity:1; } }
    .record-label {
      font-size: 12px;
      font-weight: 900;
      min-height: 16px;
      letter-spacing: .02em;
    }
    .save-video {
      display: none;
      padding: 8px 13px;
      border-radius: 999px;
      color: #111;
      background: rgba(255,255,255,.94);
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 8px 24px rgba(0,0,0,.32);
    }
    .save-video.ready { display: inline-flex; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,.52);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(560px, 100%);
      max-height: min(82vh, 720px);
      overflow: auto;
      color: #fff;
      background: rgba(14,14,18,.95);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      box-shadow: 0 20px 70px rgba(0,0,0,.44);
      padding: 18px;
    }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    h1 { margin: 0 0 6px; font-size: 20px; }
    p { margin: 6px 0; font-size: 13px; line-height: 1.55; opacity: .9; }
    .close-button {
      border: 0;
      border-radius: 999px;
      width: 36px;
      height: 36px;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      background: #fff;
      color: #111;
      cursor: pointer;
      flex: none;
    }
    .section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.12);
    }
    .row { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; }
    button, label.btn, select, .primary-link {
      border: 0;
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 800;
      background: #fff;
      color: #111;
      cursor: pointer;
    }
    .primary-link { background: #2563eb; color: white; text-decoration: none; }
    .ghost-button { background: #e5e7eb; }
    label.btn { display: inline-flex; align-items: center; }
    input[type=file] { display: none; }
    select { min-width: 118px; }
    .small { font-size: 12px; opacity: .82; }

    #toast {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 64px);
      left: 50%;
      z-index: 1150;
      max-width: 220px;
      padding: 6px 10px;
      border-radius: 999px;
      color: rgba(255,255,255,.92);
      background: rgba(0,0,0,.32);
      border: 1px solid rgba(255,255,255,.10);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -4px);
      transition: opacity 220ms ease, transform 220ms ease;
      text-shadow: 0 1px 3px rgba(0,0,0,.65);
    }
    #toast.show { opacity: .68; transform: translate(-50%, 0); }
    #recordCanvas { display: none; }

    @media (max-width: 520px) {
      .top-controls { right: calc(env(safe-area-inset-right, 0px) + 92px); }
      .h-control { grid-template-columns: 48px minmax(64px, 1fr) 38px; gap: 6px; }
      .right-controls { width: 78px; gap: 4px; right: calc(env(safe-area-inset-right, 0px) + 4px); }
      .v-control input[type="range"] { height: min(42vh, 230px); }
      .record-main { width: 70px; height: 70px; }
      .record-main::before { width: 50px; height: 50px; }
    }
  </style>
</head>
<body>
  <canvas id="artCanvas"></canvas>

  <div class="top-controls" aria-label="上部AR調整">
    <div class="caption"><span>AR調整</span><span>高さ / 横位置</span></div>
    <label class="h-control">高さ <input id="height" type="range" min="-120" max="520" step="1" value="120"><b id="heightVal">120</b></label>
    <label class="h-control">横位置 <input id="offsetX" type="range" min="-320" max="320" step="1" value="0"><b id="offsetXVal">0</b></label>
  </div>

  <div class="right-controls" aria-label="右側AR調整">
    <label class="v-control"><span>大きさ</span><input id="size" type="range" min="0.25" max="3.5" step="0.01" value="1.0"><b id="sizeVal">1.00</b></label>
    <label class="v-control"><span>回転</span><input id="rotation" type="range" min="-180" max="180" step="1" value="0"><b id="rotationVal">0°</b></label>
  </div>

  <button class="menu-button" id="openMenu" type="button" aria-haspopup="dialog" aria-controls="menuModal">menu</button>

  <div class="record-dock" aria-label="録画操作">
    <a id="downloadVideo" class="save-video" href="#" download="ar-drawing.webm">動画を保存</a>
    <button id="recordToggle" class="record-main" type="button" aria-label="録画開始"></button>
    <div id="recordStatus" class="record-label">タップで録画</div>
  </div>

  <div class="modal-backdrop" id="menuModal" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
    <section class="modal">
      <div class="modal-header">
        <div>
          <h1 id="menuTitle">動くお絵かきAR</h1>
          <p>AR.jsのカメラ映像を画面いっぱいに表示し、その上に絵を透明canvasで合成します。録画は画面と同じ構成で、カメラ映像と絵だけを書き出します。</p>
        </div>
        <button class="close-button" id="closeMenu" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="section">
        <p class="small">絵を選ぶ</p>
        <div class="row">
          <select id="preset" title="絵">
            <option value="fish">魚</option>
            <option value="jellyfish">クラゲ</option>
          </select>
          <label class="btn">自分の絵に変更<input id="file" type="file" accept="image/*"></label>
        </div>
      </div>

      <div class="section">
        <p class="small">動き</p>
        <div class="row">
          <select id="motion" title="動き">
            <option value="float">ふわふわ</option>
            <option value="swim">泳ぐ</option>
            <option value="spin">くるくる</option>
            <option value="jump">ぴょんぴょん</option>
            <option value="still">止める</option>
          </select>
        </div>
      </div>

      <div class="section">
        <div class="row">
          <a class="primary-link" href="hiro-marker-print.html" target="_blank" rel="noopener">Hiroを印刷</a>
          <button class="ghost-button" id="resetPose" type="button">表示位置をリセット</button>
        </div>
        <p class="small">録画ボタンは下部中央です。menu・スライダー・トースト・録画ボタンは録画には入りません。</p>
      </div>
    </section>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>
  <canvas id="recordCanvas"></canvas>

  <a-scene
    embedded
    vr-mode-ui="enabled:false"
    renderer="alpha:true; antialias:true; logarithmicDepthBuffer:true"
    arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;"
  >
    <a-marker id="hiroMarker" preset="hiro" smooth="true" smoothCount="7" smoothTolerance="0.01" smoothThreshold="5"></a-marker>
    <a-entity id="arCamera" camera></a-entity>
  </a-scene>

<script>
const fishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#1d3557" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M115 260 C170 150 330 150 395 255 C330 365 170 365 115 260 Z" fill="#ffb703"/>
    <path d="M395 255 L472 188 L456 255 L472 322 Z" fill="#fb8500"/>
    <path d="M225 175 L275 92 L302 186 Z" fill="#8ecae6"/>
    <path d="M232 340 L285 420 L305 330 Z" fill="#8ecae6"/>
    <circle cx="165" cy="235" r="14" fill="#1d3557" stroke="none"/>
    <path d="M190 292 C225 318 270 320 310 292" fill="none"/>
    <path d="M255 170 C235 220 235 295 255 345" fill="none" opacity=".55"/>
    <path d="M315 190 C290 235 290 290 315 330" fill="none" opacity=".55"/>
    <circle cx="100" cy="225" r="10" fill="#90e0ef" stroke="none" opacity=".9"/>
    <circle cx="73" cy="184" r="14" fill="#90e0ef" stroke="none" opacity=".75"/>
    <circle cx="55" cy="245" r="8" fill="#90e0ef" stroke="none" opacity=".7"/>
  </g>
</svg>`;

const jellyfishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#5b2a86" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M118 240 C130 132 204 78 256 78 C323 78 388 130 398 240 C372 272 329 288 256 288 C184 288 144 272 118 240 Z" fill="#ffafcc"/>
    <path d="M139 250 C170 223 198 223 230 250 C260 280 308 280 376 250" fill="none" opacity=".55"/>
    <circle cx="218" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <circle cx="294" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <path d="M225 225 C245 238 268 238 288 225" fill="none"/>
    <path d="M175 286 C135 332 164 368 130 422" fill="none"/>
    <path d="M220 290 C190 350 230 382 205 448" fill="none"/>
    <path d="M266 290 C245 350 285 386 265 452" fill="none"/>
    <path d="M312 286 C356 336 320 377 358 432" fill="none"/>
    <path d="M350 278 C405 326 365 368 412 422" fill="none"/>
    <circle cx="106" cy="120" r="12" fill="#bde0fe" stroke="none" opacity=".8"/>
    <circle cx="420" cy="100" r="18" fill="#bde0fe" stroke="none" opacity=".65"/>
    <circle cx="438" cy="205" r="10" fill="#bde0fe" stroke="none" opacity=".75"/>
  </g>
</svg>`;

const artCanvas = document.getElementById('artCanvas');
const artCtx = artCanvas.getContext('2d');
const recordCanvas = document.getElementById('recordCanvas');
const recordCtx = recordCanvas.getContext('2d');
const markerEl = document.getElementById('hiroMarker');
const sceneEl = document.querySelector('a-scene');
const preset = document.getElementById('preset');
const motion = document.getElementById('motion');
const height = document.getElementById('height');
const offsetX = document.getElementById('offsetX');
const size = document.getElementById('size');
const rotation = document.getElementById('rotation');
const heightVal = document.getElementById('heightVal');
const offsetXVal = document.getElementById('offsetXVal');
const sizeVal = document.getElementById('sizeVal');
const rotationVal = document.getElementById('rotationVal');
const fileInput = document.getElementById('file');
const modal = document.getElementById('menuModal');
const openMenu = document.getElementById('openMenu');
const closeMenu = document.getElementById('closeMenu');
const resetPose = document.getElementById('resetPose');
const toastEl = document.getElementById('toast');
const recordToggle = document.getElementById('recordToggle');
const downloadVideo = document.getElementById('downloadVideo');
const recordStatus = document.getElementById('recordStatus');

const state = {
  hasPose: false,
  markerVisible: false,
  x: window.innerWidth / 2,
  y: window.innerHeight / 2,
  lastToastAt: 0,
  image: null,
  imageRatio: 1,
  baseHeight: 170,
  recorder: null,
  chunks: [],
  recording: false,
  videoUrl: null,
};

const tmpWorld = new THREE.Vector3();

function setImportantStyle(el, prop, value) {
  if (el && el.style) el.style.setProperty(prop, value, 'important');
}

function forceFullscreenAr() {
  document.documentElement.style.setProperty('overflow', 'hidden', 'important');
  document.body.style.setProperty('overflow', 'hidden', 'important');

  document.querySelectorAll('video, #arjs-video, .arjs-video').forEach(video => {
    setImportantStyle(video, 'position', 'fixed');
    setImportantStyle(video, 'top', '0');
    setImportantStyle(video, 'left', '0');
    setImportantStyle(video, 'right', '0');
    setImportantStyle(video, 'bottom', '0');
    setImportantStyle(video, 'width', '100vw');
    setImportantStyle(video, 'height', '100vh');
    setImportantStyle(video, 'min-width', '100vw');
    setImportantStyle(video, 'min-height', '100vh');
    setImportantStyle(video, 'max-width', 'none');
    setImportantStyle(video, 'max-height', 'none');
    setImportantStyle(video, 'object-fit', 'cover');
    setImportantStyle(video, 'margin', '0');
    setImportantStyle(video, 'padding', '0');
    setImportantStyle(video, 'transform', 'none');
    setImportantStyle(video, 'z-index', '0');
    setImportantStyle(video, 'display', 'block');
    setImportantStyle(video, 'visibility', 'visible');
    setImportantStyle(video, 'opacity', '1');
    video.setAttribute('playsinline', '');
    video.muted = true;
  });

  document.querySelectorAll('a-scene canvas, canvas.a-canvas').forEach(canvas => {
    setImportantStyle(canvas, 'position', 'fixed');
    setImportantStyle(canvas, 'inset', '0');
    setImportantStyle(canvas, 'width', '100vw');
    setImportantStyle(canvas, 'height', '100vh');
    setImportantStyle(canvas, 'background', 'transparent');
    setImportantStyle(canvas, 'opacity', '0');
    setImportantStyle(canvas, 'pointer-events', 'none');
  });

  if (sceneEl && sceneEl.renderer) {
    try {
      sceneEl.renderer.setClearColor(0x000000, 0);
      sceneEl.renderer.setClearAlpha(0);
    } catch (error) {}
  }
}

function findArVideo() {
  const videos = Array.from(document.querySelectorAll('video'));
  return videos.find(v => (v.srcObject || v.videoWidth || v.id === 'arjs-video' || v.classList.contains('arjs-video'))) || null;
}

function values() {
  return {
    h: Number(height.value),
    x: Number(offsetX.value),
    s: Number(size.value),
    r: Number(rotation.value),
    motion: motion.value,
  };
}

function updateLabels() {
  const v = values();
  heightVal.textContent = Math.round(v.h);
  offsetXVal.textContent = Math.round(v.x);
  sizeVal.textContent = v.s.toFixed(2);
  rotationVal.textContent = `${Math.round(v.r)}°`;
}
[height, offsetX, size, rotation].forEach(input => input.addEventListener('input', updateLabels));

function openModal() { modal.classList.add('open'); }
function closeModal() { modal.classList.remove('open'); }
openMenu.addEventListener('click', openModal);
closeMenu.addEventListener('click', closeModal);
modal.addEventListener('click', event => { if (event.target === modal) closeModal(); });
window.addEventListener('keydown', event => { if (event.key === 'Escape') closeModal(); });

function showToast(message) {
  const now = performance.now();
  if (now - state.lastToastAt < 1600) return;
  state.lastToastAt = now;
  toastEl.textContent = message;
  toastEl.classList.add('show');
  window.clearTimeout(showToast.timer);
  showToast.timer = window.setTimeout(() => toastEl.classList.remove('show'), 750);
}

function svgToDataUri(svg) {
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function setArtwork(src) {
  const img = await loadImage(src);
  state.image = img;
  const w = img.naturalWidth || img.width || 1;
  const h = img.naturalHeight || img.height || 1;
  state.imageRatio = Math.max(0.01, w / h);
}

async function setPreset(name) {
  await setArtwork(svgToDataUri(name === 'jellyfish' ? jellyfishSvg : fishSvg));
}

preset.addEventListener('change', event => setPreset(event.target.value));
fileInput.addEventListener('change', event => {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      await setArtwork(reader.result);
      closeModal();
    } catch (error) {
      alert('画像を読み込めませんでした。別の画像で試してください。');
    }
  };
  reader.readAsDataURL(file);
});

resetPose.addEventListener('click', () => {
  state.hasPose = false;
  state.markerVisible = false;
  state.x = window.innerWidth / 2;
  state.y = window.innerHeight / 2;
  showToast('位置リセット');
  closeModal();
});

function resizeCanvases() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.max(1, window.innerWidth);
  const h = Math.max(1, window.innerHeight);
  const bw = Math.round(w * dpr);
  const bh = Math.round(h * dpr);

  if (artCanvas.width !== bw || artCanvas.height !== bh) {
    artCanvas.width = bw;
    artCanvas.height = bh;
    artCanvas.style.width = w + 'px';
    artCanvas.style.height = h + 'px';
  }
  if (recordCanvas.width !== w || recordCanvas.height !== h) {
    recordCanvas.width = w;
    recordCanvas.height = h;
  }
  state.baseHeight = Math.max(110, Math.min(w, h) * 0.24);
}

function updateMarkerPosition() {
  const camera = sceneEl.camera;
  if (!camera || !markerEl.object3D) return;

  const visible = !!markerEl.object3D.visible;
  if (visible) {
    markerEl.object3D.updateMatrixWorld(true);
    markerEl.object3D.getWorldPosition(tmpWorld);
    tmpWorld.project(camera);
    const sx = (tmpWorld.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-tmpWorld.y * 0.5 + 0.5) * window.innerHeight;
    if (Number.isFinite(sx) && Number.isFinite(sy)) {
      if (!state.hasPose) {
        state.x = sx;
        state.y = sy;
        state.hasPose = true;
      } else {
        state.x += (sx - state.x) * 0.28;
        state.y += (sy - state.y) * 0.28;
      }
    }
  }

  if (visible !== state.markerVisible) {
    state.markerVisible = visible;
    showToast(visible ? 'Hiro認識' : 'Hiro保持');
  }
}

function motionOffset(now, type) {
  const t = now / 1000;
  if (type === 'float') return { x: 0, y: Math.sin(t * 2.8) * 18, rotation: Math.sin(t * 1.7) * 4 };
  if (type === 'swim') return { x: Math.sin(t * 3.2) * 34, y: Math.sin(t * 2.0) * 7, rotation: Math.sin(t * 3.2) * 6 };
  if (type === 'spin') return { x: 0, y: 0, rotation: (t * 120) % 360 };
  if (type === 'jump') return { x: 0, y: -Math.abs(Math.sin(t * 4.0)) * 42, rotation: 0 };
  return { x: 0, y: 0, rotation: 0 };
}

function computeArtRect(now = performance.now()) {
  const v = values();
  const m = motionOffset(now, v.motion);
  const h = state.baseHeight * v.s;
  const w = h * state.imageRatio;
  return {
    visible: !!(state.image && state.hasPose),
    cx: state.x + v.x + m.x,
    cy: state.y - v.h + m.y,
    w,
    h,
    rotation: (v.r + m.rotation) * Math.PI / 180,
  };
}

function drawArt(ctx, rect) {
  if (!rect.visible || !state.image) return;
  ctx.save();
  ctx.translate(rect.cx, rect.cy);
  ctx.rotate(rect.rotation);
  ctx.drawImage(state.image, -rect.w / 2, -rect.h / 2, rect.w, rect.h);
  ctx.restore();
}

function drawOverlay(now) {
  resizeCanvases();
  forceFullscreenAr();
  updateMarkerPosition();
  const w = window.innerWidth;
  const h = window.innerHeight;
  const dpr = artCanvas.width / w;
  artCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  artCtx.clearRect(0, 0, w, h);
  drawArt(artCtx, computeArtRect(now));
}

function drawVideoCover(ctx, video, w, h) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);
  if (!video || !video.videoWidth || !video.videoHeight) return;
  const vr = video.videoWidth / video.videoHeight;
  const cr = w / h;
  let sw = video.videoWidth, sh = video.videoHeight, sx = 0, sy = 0;
  if (vr > cr) {
    sw = video.videoHeight * cr;
    sx = (video.videoWidth - sw) / 2;
  } else {
    sh = video.videoWidth / cr;
    sy = (video.videoHeight - sh) / 2;
  }
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, w, h);
}

function drawRecordFrame(now) {
  const w = recordCanvas.width;
  const h = recordCanvas.height;
  recordCtx.setTransform(1, 0, 0, 1, 0, 0);
  drawVideoCover(recordCtx, findArVideo(), w, h);
  drawArt(recordCtx, computeArtRect(now));
}

function loop(now) {
  drawOverlay(now);
  if (state.recording) drawRecordFrame(now);
  requestAnimationFrame(loop);
}

function supportedMimeType() {
  const options = [
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm',
    'video/mp4'
  ];
  return options.find(type => window.MediaRecorder && MediaRecorder.isTypeSupported(type)) || '';
}

function setRecordState(mode) {
  if (mode === 'recording') {
    recordToggle.classList.add('recording');
    recordToggle.setAttribute('aria-label', '録画停止');
    recordStatus.textContent = '録画中';
    downloadVideo.classList.remove('ready');
  } else if (mode === 'ready') {
    recordToggle.classList.remove('recording');
    recordToggle.setAttribute('aria-label', '録画開始');
    recordStatus.textContent = '保存できます';
    downloadVideo.classList.add('ready');
  } else {
    recordToggle.classList.remove('recording');
    recordToggle.setAttribute('aria-label', '録画開始');
    recordStatus.textContent = 'タップで録画';
    downloadVideo.classList.remove('ready');
  }
}

function startRecording() {
  if (!window.MediaRecorder || !recordCanvas.captureStream) {
    alert('このブラウザでは録画に対応していません。Android Chrome / Edge で試してください。');
    return;
  }
  const video = findArVideo();
  if (!video || !video.videoWidth || !video.videoHeight) {
    alert('カメラ映像の準備中です。少し待ってからもう一度押してください。');
    return;
  }
  if (state.videoUrl) {
    URL.revokeObjectURL(state.videoUrl);
    state.videoUrl = null;
  }
  downloadVideo.href = '#';
  downloadVideo.classList.remove('ready');
  state.chunks = [];
  resizeCanvases();
  drawRecordFrame(performance.now());

  const stream = recordCanvas.captureStream(30);
  const mimeType = supportedMimeType();
  const options = mimeType ? { mimeType } : undefined;
  try {
    state.recorder = new MediaRecorder(stream, options);
  } catch (error) {
    alert('録画を開始できませんでした。別のブラウザで試してください。');
    return;
  }
  state.recorder.ondataavailable = event => {
    if (event.data && event.data.size) state.chunks.push(event.data);
  };
  state.recorder.onstop = () => {
    const type = state.chunks[0]?.type || mimeType || 'video/webm';
    const blob = new Blob(state.chunks, { type });
    state.videoUrl = URL.createObjectURL(blob);
    downloadVideo.href = state.videoUrl;
    downloadVideo.download = type.includes('mp4') ? 'ar-drawing.mp4' : 'ar-drawing.webm';
    state.recording = false;
    setRecordState('ready');
  };
  state.recording = true;
  state.recorder.start(200);
  setRecordState('recording');
}

function stopRecording() {
  if (state.recorder && state.recorder.state !== 'inactive') {
    state.recorder.stop();
  }
  state.recording = false;
}

recordToggle.addEventListener('click', () => {
  if (state.recording) stopRecording();
  else startRecording();
});

window.addEventListener('resize', resizeCanvases);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvases, 250));
sceneEl.addEventListener('loaded', forceFullscreenAr);
sceneEl.addEventListener('renderstart', forceFullscreenAr);
new MutationObserver(forceFullscreenAr).observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'class'] });
window.setInterval(forceFullscreenAr, 250);

updateLabels();
setPreset('fish');
setRecordState('idle');
requestAnimationFrame(loop);
</script>
</body>
</html>
