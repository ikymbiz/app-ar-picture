<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>動くお絵かきAR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; overflow: hidden; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#111; }
    .panel {
      position: fixed; left: 12px; right: 12px; top: 12px; z-index: 10;
      background: rgba(0,0,0,.68); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.18); border-radius: 16px;
      padding: 12px; color: #fff; box-shadow: 0 8px 30px rgba(0,0,0,.25);
    }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    h1 { margin: 0 0 8px; font-size: 18px; }
    p { margin: 6px 0; font-size: 13px; line-height: 1.45; opacity: .9; }
    button, label.btn, select, input[type="range"] {
      border: 0; border-radius: 999px; padding: 8px 12px; font-weight: 700;
      background: #fff; color: #111;
    }
    label.btn { display: inline-flex; cursor: pointer; }
    input[type="file"] { display: none; }
    .small { font-size: 12px; opacity: .75; }
    a { color: #9bd1ff; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="panel" id="panel">
    <h1>動くお絵かきAR</h1>
    <p>最初は魚の絵が表示されます。自分で描いた絵にしたい場合は、画像を選択してください。Hiroマーカーをカメラに映すと絵が動きます。</p>
    <div class="row">
      <label class="btn">自分の絵に変更<input id="file" type="file" accept="image/*"></label>
      <select id="motion" title="動き">
        <option value="float">ふわふわ</option>
        <option value="spin">くるくる</option>
        <option value="jump">ぴょんぴょん</option>
      </select>
      <span class="small">大きさ</span><input id="scale" type="range" min="0.4" max="2.4" step="0.1" value="1.2">
      <button id="hide">UIを隠す</button>
    </div>
    <p class="small">マーカー: <a href="hiro-marker-print.html" target="_blank" rel="noopener">Hiroマーカーを印刷</a></p>
  </div>

  <a-scene embedded vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true"
    arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;">
    <a-assets>
      <img id="drawingTexture" crossorigin="anonymous"
        src="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27512%27%20height%3D%27512%27%20viewBox%3D%270%200%20512%20512%27%3E%0A%20%20%3Crect%20width%3D%27512%27%20height%3D%27512%27%20fill%3D%27none%27%2F%3E%0A%20%20%3Cg%20stroke%3D%27%231d3557%27%20stroke-width%3D%2712%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27%3E%0A%20%20%20%20%3Cpath%20d%3D%27M120%20260%20C175%20150%20330%20150%20395%20255%20C330%20365%20175%20365%20120%20260%20Z%27%20fill%3D%27%23ffb703%27%2F%3E%0A%20%20%20%20%3Cpath%20d%3D%27M395%20255%20L470%20190%20L458%20255%20L470%20320%20Z%27%20fill%3D%27%23fb8500%27%2F%3E%0A%20%20%20%20%3Cpath%20d%3D%27M230%20175%20L275%2095%20L300%20185%20Z%27%20fill%3D%27%238ecae6%27%2F%3E%0A%20%20%20%20%3Cpath%20d%3D%27M235%20340%20L285%20420%20L305%20330%20Z%27%20fill%3D%27%238ecae6%27%2F%3E%0A%20%20%20%20%3Ccircle%20cx%3D%27165%27%20cy%3D%27235%27%20r%3D%2714%27%20fill%3D%27%231d3557%27%20stroke%3D%27none%27%2F%3E%0A%20%20%20%20%3Cpath%20d%3D%27M190%20292%20C225%20318%20270%20320%20310%20292%27%20fill%3D%27none%27%2F%3E%0A%20%20%20%20%3Cpath%20d%3D%27M255%20170%20C235%20220%20235%20295%20255%20345%27%20fill%3D%27none%27%20opacity%3D%27.55%27%2F%3E%0A%20%20%20%20%3Cpath%20d%3D%27M315%20190%20C290%20235%20290%20290%20315%20330%27%20fill%3D%27none%27%20opacity%3D%27.55%27%2F%3E%0A%20%20%20%20%3Ccircle%20cx%3D%27105%27%20cy%3D%27225%27%20r%3D%2710%27%20fill%3D%27%2390e0ef%27%20stroke%3D%27none%27%20opacity%3D%27.9%27%2F%3E%0A%20%20%20%20%3Ccircle%20cx%3D%2775%27%20cy%3D%27185%27%20r%3D%2714%27%20fill%3D%27%2390e0ef%27%20stroke%3D%27none%27%20opacity%3D%27.75%27%2F%3E%0A%20%20%20%20%3Ccircle%20cx%3D%2755%27%20cy%3D%27245%27%20r%3D%278%27%20fill%3D%27%2390e0ef%27%20stroke%3D%27none%27%20opacity%3D%27.7%27%2F%3E%0A%20%20%3C%2Fg%3E%0A%3C%2Fsvg%3E" />
    </a-assets>

    <a-marker preset="hiro" smooth="true" smoothCount="8" smoothTolerance="0.01" smoothThreshold="5">
      <a-entity id="drawing"
        geometry="primitive: plane; width: 1; height: 1"
        material="src: #drawingTexture; transparent: true; side: double; alphaTest: 0.05"
        position="0 0.25 0"
        rotation="-90 0 0"
        scale="1.2 1.2 1.2"
        animation__float="property: position; dir: alternate; dur: 900; easing: easeInOutSine; loop: true; to: 0 0.55 0">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

<script>
const fileInput = document.getElementById('file');
const texture = document.getElementById('drawingTexture');
const drawing = document.getElementById('drawing');
const motion = document.getElementById('motion');
const scale = document.getElementById('scale');
const panel = document.getElementById('panel');
document.getElementById('hide').addEventListener('click', () => panel.classList.toggle('hidden'));

function applyMotion(type) {
  drawing.removeAttribute('animation__float');
  drawing.removeAttribute('animation__spin');
  drawing.removeAttribute('animation__jump');
  drawing.setAttribute('position', '0 0.25 0');
  drawing.setAttribute('rotation', '-90 0 0');

  if (type === 'float') {
    drawing.setAttribute('animation__float', 'property: position; dir: alternate; dur: 900; easing: easeInOutSine; loop: true; to: 0 0.55 0');
  } else if (type === 'spin') {
    drawing.setAttribute('animation__spin', 'property: rotation; dur: 1800; easing: linear; loop: true; to: -90 360 0');
  } else {
    drawing.setAttribute('animation__jump', 'property: position; dir: alternate; dur: 420; easing: easeOutQuad; loop: true; to: 0 0.8 0');
  }
}

motion.addEventListener('change', e => applyMotion(e.target.value));
scale.addEventListener('input', e => {
  const s = e.target.value;
  drawing.setAttribute('scale', `${s} ${s} ${s}`);
});

fileInput.addEventListener('change', async (event) => {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const src = URL.createObjectURL(file);
  texture.onload = () => {
    drawing.setAttribute('material', 'src', '#drawingTexture');
    URL.revokeObjectURL(src);
  };
  texture.src = src;
});
</script>
</body>
</html>
