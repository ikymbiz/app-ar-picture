<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>動くお絵かきAR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
    }
    a { color: #9bd1ff; }
    .menu-button {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 30;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 999px;
      padding: 10px 15px;
      font-weight: 800;
      letter-spacing: .02em;
      color: #111;
      background: rgba(255,255,255,.94);
      box-shadow: 0 8px 24px rgba(0,0,0,.28);
      cursor: pointer;
    }
    .status-pill {
      position: fixed;
      left: 12px;
      bottom: 12px;
      right: 12px;
      z-index: 20;
      width: fit-content;
      max-width: calc(100vw - 24px);
      border-radius: 999px;
      padding: 9px 13px;
      color: #e0f2fe;
      background: rgba(0,0,0,.68);
      border: 1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(10px);
      font-size: 12px;
      line-height: 1.35;
      box-shadow: 0 8px 24px rgba(0,0,0,.22);
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(5px);
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(560px, 100%);
      max-height: min(82vh, 720px);
      overflow: auto;
      color: #fff;
      background: rgba(14,14,18,.94);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      box-shadow: 0 20px 70px rgba(0,0,0,.42);
      padding: 18px;
    }
    .modal-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    h1 { margin: 0 0 6px; font-size: 20px; }
    p { margin: 6px 0; font-size: 13px; line-height: 1.55; opacity: .9; }
    .close-button {
      border: 0;
      border-radius: 999px;
      width: 36px;
      height: 36px;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      background: #fff;
      color: #111;
      cursor: pointer;
      flex: none;
    }
    .section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.12);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
    }
    button, label.btn, select, input[type=range] {
      border: 0;
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 750;
      background: #fff;
      color: #111;
    }
    button, label.btn, select { cursor: pointer; }
    label.btn { display: inline-flex; align-items: center; }
    input[type=file] { display: none; }
    select { min-width: 112px; }
    .control {
      display: grid;
      grid-template-columns: 74px 1fr 42px;
      width: 100%;
      gap: 8px;
      align-items: center;
      padding: 7px 0;
      font-size: 13px;
    }
    .control input { width: 100%; }
    .control b { text-align: right; }
    .small { font-size: 12px; opacity: .82; }
    .primary-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 9px 12px;
      background: #1d4ed8;
      color: white;
      text-decoration: none;
      font-weight: 800;
    }
    .ghost-button { background: #e5e7eb; }
  </style>
  <script>
    AFRAME.registerComponent('keep-last-marker-pose', {
      schema: {
        marker: { type: 'selector' },
        anchor: { type: 'selector' }
      },
      init: function () {
        this.hasPose = false;
        this.position = new THREE.Vector3();
        this.quaternion = new THREE.Quaternion();
      },
      tick: function () {
        const markerEl = this.data.marker;
        const anchorEl = this.data.anchor;
        if (!markerEl || !anchorEl || !markerEl.object3D || !anchorEl.object3D) return;

        if (markerEl.object3D.visible) {
          markerEl.object3D.updateMatrixWorld(true);

          // Hiroマーカーの検出状態によって matrixWorld の scale が揺れることがあるため、
          // 位置と回転だけを使います。絵の大きさは下の「大きさ」スライダーだけで変更します。
          markerEl.object3D.matrixWorld.decompose(this.position, this.quaternion, new THREE.Vector3());
          anchorEl.object3D.position.copy(this.position);
          anchorEl.object3D.quaternion.copy(this.quaternion);
          anchorEl.object3D.scale.set(1, 1, 1);
          anchorEl.object3D.visible = true;
          this.hasPose = true;
          window.__markerSeen = true;
        } else if (!this.hasPose) {
          anchorEl.object3D.visible = false;
        } else {
          anchorEl.object3D.visible = true;
        }
      }
    });
  </script>
</head>
<body>
  <button class="menu-button" id="openMenu" type="button" aria-haspopup="dialog" aria-controls="menuModal">menu</button>
  <div class="status-pill" id="status">読み込み中...</div>

  <div class="modal-backdrop open" id="menuModal" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
    <section class="modal">
      <div class="modal-header">
        <div>
          <h1 id="menuTitle">動くお絵かきAR</h1>
          <p>Hiroマーカーを映すと、魚・クラゲ・自分の絵が動きます。Hiroから離れても、最後に見えた位置に画像を残します。Hiroの検出がズレても、絵の縮尺は固定します。</p>
        </div>
        <button class="close-button" id="closeMenu" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="section">
        <p class="small">絵を選ぶ</p>
        <div class="row">
          <select id="preset" title="絵">
            <option value="fish">魚</option>
            <option value="jellyfish">クラゲ</option>
          </select>
          <label class="btn">自分の絵に変更<input id="file" type="file" accept="image/*"></label>
        </div>
      </div>

      <div class="section">
        <p class="small">動き</p>
        <div class="row">
          <select id="motion" title="動き">
            <option value="float">ふわふわ</option>
            <option value="swim">泳ぐ</option>
            <option value="spin">くるくる</option>
            <option value="jump">ぴょんぴょん</option>
          </select>
        </div>
      </div>

      <div class="section">
        <label class="control">大きさ <input id="scale" type="range" min="0.3" max="3.5" step="0.1" value="1.2"><b id="scaleVal">1.2</b></label>
        <label class="control">高さ <input id="height" type="range" min="0" max="5" step="0.1" value="1.0"><b id="heightVal">1.0</b></label>
        <p class="small">Hiroマーカーの揺れでは絵の縮尺を変えません。大きさを変える時はこのスライダーを使います。</p>
      </div>

      <div class="section">
        <div class="row">
          <a class="primary-link" href="hiro-marker-print.html" target="_blank" rel="noopener">Hiroを印刷</a>
          <button class="ghost-button" id="resetPose" type="button">表示位置をリセット</button>
        </div>
        <p class="small">リセット後は、もう一度Hiroマーカーを映すと画像が表示されます。</p>
      </div>
    </section>
  </div>

  <a-scene
    embedded
    keep-last-marker-pose="marker:#hiroMarker; anchor:#lastAnchor"
    vr-mode-ui="enabled:false"
    renderer="logarithmicDepthBuffer:true; antialias:true; alpha:true"
    arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;"
  >
    <a-marker id="hiroMarker" preset="hiro" smooth="true" smoothCount="8" smoothTolerance="0.01" smoothThreshold="5"></a-marker>

    <a-entity id="lastAnchor" visible="false">
      <a-entity
        id="drawing"
        geometry="primitive:plane; width:1; height:1"
        material="transparent:true; side:double; alphaTest:0.03"
        position="0 1.0 0"
        rotation="-90 0 0"
        scale="1.2 1.2 1.2"
      ></a-entity>
    </a-entity>

    <a-entity camera></a-entity>
  </a-scene>

<script>
const fishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#1d3557" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M115 260 C170 150 330 150 395 255 C330 365 170 365 115 260 Z" fill="#ffb703"/>
    <path d="M395 255 L472 188 L456 255 L472 322 Z" fill="#fb8500"/>
    <path d="M225 175 L275 92 L302 186 Z" fill="#8ecae6"/>
    <path d="M232 340 L285 420 L305 330 Z" fill="#8ecae6"/>
    <circle cx="165" cy="235" r="14" fill="#1d3557" stroke="none"/>
    <path d="M190 292 C225 318 270 320 310 292" fill="none"/>
    <path d="M255 170 C235 220 235 295 255 345" fill="none" opacity=".55"/>
    <path d="M315 190 C290 235 290 290 315 330" fill="none" opacity=".55"/>
    <circle cx="100" cy="225" r="10" fill="#90e0ef" stroke="none" opacity=".9"/>
    <circle cx="73" cy="184" r="14" fill="#90e0ef" stroke="none" opacity=".75"/>
    <circle cx="55" cy="245" r="8" fill="#90e0ef" stroke="none" opacity=".7"/>
  </g>
</svg>`;

const jellyfishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#5b2a86" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M118 240 C130 132 204 78 256 78 C323 78 388 130 398 240 C372 272 329 288 256 288 C184 288 144 272 118 240 Z" fill="#ffafcc"/>
    <path d="M139 250 C170 223 198 223 230 250 C260 280 308 280 376 250" fill="none" opacity=".55"/>
    <circle cx="218" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <circle cx="294" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <path d="M225 225 C245 238 268 238 288 225" fill="none"/>
    <path d="M175 286 C135 332 164 368 130 422" fill="none"/>
    <path d="M220 290 C190 350 230 382 205 448" fill="none"/>
    <path d="M266 290 C245 350 285 386 265 452" fill="none"/>
    <path d="M312 286 C356 336 320 377 358 432" fill="none"/>
    <path d="M350 278 C405 326 365 368 412 422" fill="none"/>
    <circle cx="106" cy="120" r="12" fill="#bde0fe" stroke="none" opacity=".8"/>
    <circle cx="420" cy="100" r="18" fill="#bde0fe" stroke="none" opacity=".65"/>
    <circle cx="438" cy="205" r="10" fill="#bde0fe" stroke="none" opacity=".75"/>
  </g>
</svg>`;

const drawing = document.getElementById('drawing');
const anchor = document.getElementById('lastAnchor');
const marker = document.getElementById('hiroMarker');
const preset = document.getElementById('preset');
const motion = document.getElementById('motion');
const scale = document.getElementById('scale');
const height = document.getElementById('height');
const scaleVal = document.getElementById('scaleVal');
const heightVal = document.getElementById('heightVal');
const fileInput = document.getElementById('file');
const status = document.getElementById('status');
const modal = document.getElementById('menuModal');
const openMenu = document.getElementById('openMenu');
const closeMenu = document.getElementById('closeMenu');
const resetPose = document.getElementById('resetPose');

const textureCache = {};
window.__markerSeen = false;

function openModal() {
  modal.classList.add('open');
}

function closeModal() {
  modal.classList.remove('open');
}

openMenu.addEventListener('click', openModal);
closeMenu.addEventListener('click', closeModal);
modal.addEventListener('click', event => {
  if (event.target === modal) closeModal();
});
window.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeModal();
});

function svgToDataUri(svg) {
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

function imageToPngDataUrl(src, maxSize = 1024) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const ratio = img.width / img.height || 1;
      let w, h;
      if (ratio >= 1) {
        w = maxSize;
        h = Math.max(1, Math.round(maxSize / ratio));
      } else {
        h = maxSize;
        w = Math.max(1, Math.round(maxSize * ratio));
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      resolve({ dataUrl: canvas.toDataURL('image/png'), ratio });
    };
    img.onerror = reject;
    img.src = src;
  });
}

async function setArtworkFromSvg(name, svg) {
  status.textContent = `${name}を読み込み中...`;
  if (!textureCache[name]) {
    textureCache[name] = await imageToPngDataUrl(svgToDataUri(svg));
  }
  setArtworkTexture(textureCache[name].dataUrl, textureCache[name].ratio);
  updateStatus(`${name}を表示中。Hiroマーカーを映してください。`);
}

function setArtworkTexture(src, ratio = 1) {
  const width = ratio >= 1 ? 1 : ratio;
  const planeHeight = ratio >= 1 ? 1 / ratio : 1;
  drawing.setAttribute('geometry', `primitive:plane; width:${width}; height:${planeHeight}`);
  drawing.setAttribute('material', {
    src,
    transparent: true,
    side: 'double',
    alphaTest: 0.03
  });
  applyMotion(motion.value);
}

function currentHeight() {
  return parseFloat(height.value);
}

function setBase() {
  drawing.setAttribute('position', `0 ${currentHeight().toFixed(2)} 0`);
}

function clearAnimations() {
  drawing.removeAttribute('animation__float');
  drawing.removeAttribute('animation__swim');
  drawing.removeAttribute('animation__spin');
  drawing.removeAttribute('animation__jump');
}

function applyMotion(type) {
  clearAnimations();
  const h = currentHeight();
  drawing.setAttribute('rotation', '-90 0 0');
  setBase();

  if (type === 'float') {
    drawing.setAttribute('animation__float', `property: position; dir: alternate; dur: 1100; easing: easeInOutSine; loop: true; to: 0 ${(h + 0.45).toFixed(2)} 0`);
  } else if (type === 'swim') {
    drawing.setAttribute('animation__swim', `property: position; dir: alternate; dur: 1300; easing: easeInOutSine; loop: true; to: 0.65 ${h.toFixed(2)} 0`);
  } else if (type === 'spin') {
    drawing.setAttribute('animation__spin', 'property: rotation; dur: 1800; easing: linear; loop: true; to: -90 360 0');
  } else if (type === 'jump') {
    drawing.setAttribute('animation__jump', `property: position; dir: alternate; dur: 520; easing: easeOutQuad; loop: true; to: 0 ${(h + 0.85).toFixed(2)} 0`);
  }
}

function updateStatus(defaultMessage) {
  if (window.__markerSeen && marker && !marker.object3D.visible) {
    status.textContent = 'Hiroを見失いました。画像は最後の位置に残しています。';
  } else {
    status.textContent = defaultMessage;
  }
}

preset.addEventListener('change', async (event) => {
  if (event.target.value === 'fish') {
    await setArtworkFromSvg('魚', fishSvg);
  } else {
    await setArtworkFromSvg('クラゲ', jellyfishSvg);
  }
});

motion.addEventListener('change', event => applyMotion(event.target.value));

scale.addEventListener('input', event => {
  const s = event.target.value;
  scaleVal.textContent = s;
  drawing.setAttribute('scale', `${s} ${s} ${s}`);
});

height.addEventListener('input', event => {
  heightVal.textContent = event.target.value;
  applyMotion(motion.value);
});

fileInput.addEventListener('change', async (event) => {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  status.textContent = '自分の絵を読み込み中...';
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const texture = await imageToPngDataUrl(reader.result);
      setArtworkTexture(texture.dataUrl, texture.ratio);
      status.textContent = '自分の絵を表示中。Hiroマーカーを映してください。';
    } catch (error) {
      status.textContent = '画像を読み込めませんでした。別の画像で試してください。';
    }
  };
  reader.readAsDataURL(file);
});

resetPose.addEventListener('click', () => {
  window.__markerSeen = false;
  anchor.object3D.visible = false;
  status.textContent = '表示位置をリセットしました。もう一度Hiroマーカーを映してください。';
});

marker.addEventListener('markerFound', () => {
  window.__markerSeen = true;
  status.textContent = 'Hiroを認識中。画像を表示しています。';
});

marker.addEventListener('markerLost', () => {
  if (window.__markerSeen) {
    status.textContent = 'Hiroを見失いました。画像は最後の位置に残しています。';
  }
});

window.addEventListener('load', () => setArtworkFromSvg('魚', fishSvg));
</script>
</body>
</html>
