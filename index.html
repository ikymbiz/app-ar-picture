<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>動くお絵かきAR - Hiro Canvas録画版</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #cameraPreview {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
      display: block !important;
      background: #000;
    }
    video,
    video.arjs-video,
    .arjs-video {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 2;
      pointer-events: none;
      background: transparent !important;
    }
    a-scene canvas,
    canvas.a-canvas {
      background: transparent !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
    #artCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 20;
      pointer-events: none;
    }
    .menu-button {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 2147483646;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;
      padding: 10px 15px;
      font-weight: 850;
      color: #111;
      background: rgba(255,255,255,.92);
      box-shadow: 0 8px 22px rgba(0,0,0,.28);
      cursor: pointer;
    }
    .record-controls {
      position: fixed !important;
      top: calc(env(safe-area-inset-top, 0px) + 10px) !important;
      left: calc(env(safe-area-inset-left, 0px) + 10px) !important;
      z-index: 2147483647 !important;
      display: flex !important;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      max-width: min(68vw, 520px);
      padding: 7px;
      color: #fff;
      background: rgba(0, 0, 0, .28);
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 18px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      text-shadow: 0 1px 5px rgba(0,0,0,.75);
      pointer-events: auto !important;
      transform: translateZ(0);
      isolation: isolate;
    }
    .record-controls button,
    .record-controls a {
      position: relative;
      z-index: 2147483647 !important;
      border: 0;
      border-radius: 999px;
      padding: 10px 13px;
      font-size: 13px;
      font-weight: 900;
      color: #111;
      background: rgba(255,255,255,.97);
      text-decoration: none;
      box-shadow: 0 6px 18px rgba(0,0,0,.28);
      cursor: pointer;
      touch-action: manipulation;
    }
    .record-controls button:disabled,
    .record-controls a.disabled {
      opacity: .45;
      pointer-events: none;
    }
    .record-dot {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 800;
      opacity: .9;
    }
    .record-dot::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: #9ca3af;
      box-shadow: 0 0 0 2px rgba(0,0,0,.22);
    }
    .record-dot.recording::before {
      background: #ef4444;
      animation: pulse 900ms ease-in-out infinite alternate;
    }
    @keyframes pulse { from { transform: scale(.85); opacity:.55; } to { transform: scale(1.1); opacity:1; } }
    .live-controls {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 55;
      color: #fff;
      background: transparent;
      border: 0;
      padding: 0 12px 6px;
      text-shadow: 0 2px 6px rgba(0,0,0,.9), 0 0 2px rgba(0,0,0,.95);
      pointer-events: auto;
    }
    .live-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
      font-size: 12px;
      font-weight: 850;
      opacity: .9;
    }
    .live-title span:last-child { font-weight: 650; opacity: .76; }
    .control {
      display: grid;
      grid-template-columns: 64px 1fr 56px;
      gap: 8px;
      align-items: center;
      padding: 4px 0;
      font-size: 13px;
      background: transparent;
    }
    .control input { width: 100%; background: transparent; }
    .control b { text-align: right; font-variant-numeric: tabular-nums; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0,0,0,.52);
      backdrop-filter: blur(5px);
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(560px, 100%);
      max-height: min(82vh, 720px);
      overflow: auto;
      color: #fff;
      background: rgba(14,14,18,.95);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      box-shadow: 0 20px 70px rgba(0,0,0,.44);
      padding: 18px;
    }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    h1 { margin: 0 0 6px; font-size: 20px; }
    p { margin: 6px 0; font-size: 13px; line-height: 1.55; opacity: .9; }
    .close-button {
      border: 0;
      border-radius: 999px;
      width: 36px;
      height: 36px;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      background: #fff;
      color: #111;
      cursor: pointer;
      flex: none;
    }
    .section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.12);
    }
    .row { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; }
    button, label.btn, select, .primary-link {
      border: 0;
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 800;
      background: #fff;
      color: #111;
      cursor: pointer;
    }
    .primary-link { background: #2563eb; color: white; text-decoration: none; }
    .ghost-button { background: #e5e7eb; }
    label.btn { display: inline-flex; align-items: center; }
    input[type=file] { display: none; }
    select { min-width: 118px; }
    .small { font-size: 12px; opacity: .82; }
    #toast {
      position: fixed;
      top: 58px;
      right: 14px;
      z-index: 80;
      max-width: 220px;
      padding: 7px 10px;
      border-radius: 999px;
      color: rgba(255,255,255,.9);
      background: rgba(0,0,0,.32);
      border: 1px solid rgba(255,255,255,.1);
      font-size: 11px;
      font-weight: 750;
      line-height: 1.2;
      pointer-events: none;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 220ms ease, transform 220ms ease;
      text-shadow: 0 1px 3px rgba(0,0,0,.6);
    }
    #toast.show { opacity: .72; transform: translateY(0); }
    #recordCanvas { display: none; }
    @media (max-height: 640px) {
      .control { grid-template-columns: 56px 1fr 48px; padding: 2px 0; font-size: 12px; }
      .live-title { margin-bottom: 1px; }
      .record-controls { max-width: calc(100vw - 96px); padding: 6px; }
      .record-controls button, .record-controls a { padding: 9px 11px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <video id="cameraPreview" autoplay muted playsinline></video>
  <canvas id="artCanvas"></canvas>

  <div class="record-controls" aria-label="録画操作">
    <button id="recordStart" type="button">録画開始</button>
    <button id="recordStop" type="button" disabled>停止</button>
    <a id="downloadVideo" class="disabled" href="#" download="ar-drawing.webm">動画を保存</a>
    <span id="recordStatus" class="record-dot">未録画</span>
  </div>

  <button class="menu-button" id="openMenu" type="button" aria-haspopup="dialog" aria-controls="menuModal">menu</button>

  <div class="live-controls" aria-label="AR画像の調整">
    <div class="live-title"><span>AR調整</span><span>絵はcanvas描画・縦横比固定</span></div>
    <label class="control">高さ <input id="height" type="range" min="-80" max="420" step="1" value="120"><b id="heightVal">120</b></label>
    <label class="control">横位置 <input id="offsetX" type="range" min="-260" max="260" step="1" value="0"><b id="offsetXVal">0</b></label>
    <label class="control">大きさ <input id="size" type="range" min="0.25" max="3.5" step="0.01" value="1.0"><b id="sizeVal">1.00</b></label>
    <label class="control">回転 <input id="rotation" type="range" min="-180" max="180" step="1" value="0"><b id="rotationVal">0°</b></label>
  </div>

  <div class="modal-backdrop" id="menuModal" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
    <section class="modal">
      <div class="modal-header">
        <div>
          <h1 id="menuTitle">動くお絵かきAR</h1>
          <p>Hiroマーカーの位置に合わせて、魚・クラゲ・自分の絵を表示します。絵はcanvasに描画するため、高さ変更やカメラ距離でひしゃげません。</p>
        </div>
        <button class="close-button" id="closeMenu" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="section">
        <p class="small">絵を選ぶ</p>
        <div class="row">
          <select id="preset" title="絵">
            <option value="fish">魚</option>
            <option value="jellyfish">クラゲ</option>
          </select>
          <label class="btn">自分の絵に変更<input id="file" type="file" accept="image/*"></label>
        </div>
      </div>

      <div class="section">
        <p class="small">動き</p>
        <div class="row">
          <select id="motion" title="動き">
            <option value="float">ふわふわ</option>
            <option value="swim">泳ぐ</option>
            <option value="spin">くるくる</option>
            <option value="jump">ぴょんぴょん</option>
            <option value="still">止める</option>
          </select>
        </div>
      </div>

      <div class="section">
        <div class="row">
          <a class="primary-link" href="hiro-marker-print.html" target="_blank" rel="noopener">Hiroを印刷</a>
          <button class="ghost-button" id="resetPose" type="button">表示位置をリセット</button>
        </div>
        <p class="small">録画ボタンは画面左上に常時表示されます。録画される映像には、カメラ映像と絵だけが入り、menu・スライダー・トースト・録画ボタンは入りません。</p>
      </div>
    </section>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>
  <canvas id="recordCanvas"></canvas>

  <a-scene
    embedded
    vr-mode-ui="enabled:false"
    renderer="logarithmicDepthBuffer:true; antialias:true; alpha:true"
    arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;"
  >
    <a-marker id="hiroMarker" preset="hiro" smooth="true" smoothCount="7" smoothTolerance="0.01" smoothThreshold="5"></a-marker>
    <a-entity id="arCamera" camera></a-entity>
  </a-scene>

<script>
const fishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#1d3557" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M115 260 C170 150 330 150 395 255 C330 365 170 365 115 260 Z" fill="#ffb703"/>
    <path d="M395 255 L472 188 L456 255 L472 322 Z" fill="#fb8500"/>
    <path d="M225 175 L275 92 L302 186 Z" fill="#8ecae6"/>
    <path d="M232 340 L285 420 L305 330 Z" fill="#8ecae6"/>
    <circle cx="165" cy="235" r="14" fill="#1d3557" stroke="none"/>
    <path d="M190 292 C225 318 270 320 310 292" fill="none"/>
    <path d="M255 170 C235 220 235 295 255 345" fill="none" opacity=".55"/>
    <path d="M315 190 C290 235 290 290 315 330" fill="none" opacity=".55"/>
    <circle cx="100" cy="225" r="10" fill="#90e0ef" stroke="none" opacity=".9"/>
    <circle cx="73" cy="184" r="14" fill="#90e0ef" stroke="none" opacity=".75"/>
    <circle cx="55" cy="245" r="8" fill="#90e0ef" stroke="none" opacity=".7"/>
  </g>
</svg>`;

const jellyfishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#5b2a86" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M118 240 C130 132 204 78 256 78 C323 78 388 130 398 240 C372 272 329 288 256 288 C184 288 144 272 118 240 Z" fill="#ffafcc"/>
    <path d="M139 250 C170 223 198 223 230 250 C260 280 308 280 376 250" fill="none" opacity=".55"/>
    <circle cx="218" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <circle cx="294" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <path d="M225 225 C245 238 268 238 288 225" fill="none"/>
    <path d="M175 286 C135 332 164 368 130 422" fill="none"/>
    <path d="M220 290 C190 350 230 382 205 448" fill="none"/>
    <path d="M266 290 C245 350 285 386 265 452" fill="none"/>
    <path d="M312 286 C356 336 320 377 358 432" fill="none"/>
    <path d="M350 278 C405 326 365 368 412 422" fill="none"/>
    <circle cx="106" cy="120" r="12" fill="#bde0fe" stroke="none" opacity=".8"/>
    <circle cx="420" cy="100" r="18" fill="#bde0fe" stroke="none" opacity=".65"/>
    <circle cx="438" cy="205" r="10" fill="#bde0fe" stroke="none" opacity=".75"/>
  </g>
</svg>`;

const cameraPreview = document.getElementById('cameraPreview');
const artCanvas = document.getElementById('artCanvas');
const artCtx = artCanvas.getContext('2d');
const recordCanvas = document.getElementById('recordCanvas');
const recordCtx = recordCanvas.getContext('2d');
const markerEl = document.getElementById('hiroMarker');
const sceneEl = document.querySelector('a-scene');
const preset = document.getElementById('preset');
const motion = document.getElementById('motion');
const height = document.getElementById('height');
const offsetX = document.getElementById('offsetX');
const size = document.getElementById('size');
const rotation = document.getElementById('rotation');
const heightVal = document.getElementById('heightVal');
const offsetXVal = document.getElementById('offsetXVal');
const sizeVal = document.getElementById('sizeVal');
const rotationVal = document.getElementById('rotationVal');
const fileInput = document.getElementById('file');
const modal = document.getElementById('menuModal');
const openMenu = document.getElementById('openMenu');
const closeMenu = document.getElementById('closeMenu');
const resetPose = document.getElementById('resetPose');
const toastEl = document.getElementById('toast');
const recordStart = document.getElementById('recordStart');
const recordStop = document.getElementById('recordStop');
const downloadVideo = document.getElementById('downloadVideo');
const recordStatus = document.getElementById('recordStatus');

const state = {
  hasPose: false,
  markerVisible: false,
  x: window.innerWidth / 2,
  y: window.innerHeight / 2,
  lastToastAt: 0,
  image: null,
  imageRatio: 1,
  baseHeight: 170,
  recorder: null,
  chunks: [],
  recording: false,
  videoUrl: null,
};

const tmpWorld = new THREE.Vector3();

function forceTransparentArCanvas() {
  const canvases = document.querySelectorAll('a-scene canvas, canvas.a-canvas');
  canvases.forEach(canvas => {
    canvas.style.background = 'transparent';
    canvas.style.opacity = '0';
    canvas.style.pointerEvents = 'none';
  });
  if (sceneEl && sceneEl.renderer) {
    try {
      sceneEl.renderer.setClearColor(0x000000, 0);
      sceneEl.renderer.setClearAlpha(0);
    } catch (error) {}
  }
}

function findArVideo() {
  const videos = Array.from(document.querySelectorAll('video'));
  return videos.find(v => v !== cameraPreview && (v.srcObject || v.videoWidth || v.classList.contains('arjs-video'))) || null;
}

function styleCameraVideo(video) {
  if (!video) return;
  Object.assign(video.style, {
    position: 'fixed',
    inset: '0px',
    width: '100vw',
    height: '100vh',
    objectFit: 'cover',
    zIndex: '0',
    display: 'block',
    visibility: 'visible',
    opacity: '1',
    background: '#000'
  });
  video.setAttribute('playsinline', '');
  video.muted = true;
}

function syncCameraPreview() {
  forceTransparentArCanvas();
  const arVideo = findArVideo();
  styleCameraVideo(arVideo);
  styleCameraVideo(cameraPreview);

  if (arVideo && arVideo.srcObject && cameraPreview.srcObject !== arVideo.srcObject) {
    cameraPreview.srcObject = arVideo.srcObject;
    cameraPreview.play().catch(() => {});
  } else if (arVideo && arVideo.src && cameraPreview.src !== arVideo.src && !cameraPreview.srcObject) {
    cameraPreview.src = arVideo.src;
    cameraPreview.play().catch(() => {});
  }
}

async function ensureCameraPreviewFallback() {
  syncCameraPreview();
  if (cameraPreview.srcObject || cameraPreview.src) return;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false
    });
    cameraPreview.srcObject = stream;
    await cameraPreview.play().catch(() => {});
    showToast('カメラ表示を復旧');
  } catch (error) {
    showToast('カメラを許可してください');
  }
}

function values() {
  return {
    h: Number(height.value),
    x: Number(offsetX.value),
    s: Number(size.value),
    r: Number(rotation.value),
    motion: motion.value,
  };
}

function updateLabels() {
  const v = values();
  heightVal.textContent = Math.round(v.h);
  offsetXVal.textContent = Math.round(v.x);
  sizeVal.textContent = v.s.toFixed(2);
  rotationVal.textContent = `${Math.round(v.r)}°`;
}

[height, offsetX, size, rotation].forEach(input => input.addEventListener('input', updateLabels));

function openModal() { modal.classList.add('open'); }
function closeModal() { modal.classList.remove('open'); }
openMenu.addEventListener('click', openModal);
closeMenu.addEventListener('click', closeModal);
modal.addEventListener('click', event => { if (event.target === modal) closeModal(); });
window.addEventListener('keydown', event => { if (event.key === 'Escape') closeModal(); });

function showToast(message) {
  const now = performance.now();
  if (now - state.lastToastAt < 1400) return;
  state.lastToastAt = now;
  toastEl.textContent = message;
  toastEl.classList.add('show');
  window.clearTimeout(showToast.timer);
  showToast.timer = window.setTimeout(() => toastEl.classList.remove('show'), 850);
}

function svgToDataUri(svg) {
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function setArtwork(src) {
  const img = await loadImage(src);
  state.image = img;
  const w = img.naturalWidth || img.width || 1;
  const h = img.naturalHeight || img.height || 1;
  state.imageRatio = Math.max(0.01, w / h);
}

async function setPreset(name) {
  await setArtwork(svgToDataUri(name === 'jellyfish' ? jellyfishSvg : fishSvg));
}

preset.addEventListener('change', event => setPreset(event.target.value));
fileInput.addEventListener('change', event => {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      await setArtwork(reader.result);
      closeModal();
    } catch (error) {
      alert('画像を読み込めませんでした。別の画像で試してください。');
    }
  };
  reader.readAsDataURL(file);
});

resetPose.addEventListener('click', () => {
  state.hasPose = false;
  state.markerVisible = false;
  state.x = window.innerWidth / 2;
  state.y = window.innerHeight / 2;
  showToast('位置をリセット');
  closeModal();
});

function resizeCanvases() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.max(1, window.innerWidth);
  const h = Math.max(1, window.innerHeight);
  const bw = Math.round(w * dpr);
  const bh = Math.round(h * dpr);
  if (artCanvas.width !== bw || artCanvas.height !== bh) {
    artCanvas.width = bw;
    artCanvas.height = bh;
    artCanvas.style.width = w + 'px';
    artCanvas.style.height = h + 'px';
  }
  if (recordCanvas.width !== w || recordCanvas.height !== h) {
    recordCanvas.width = w;
    recordCanvas.height = h;
  }
  state.baseHeight = Math.max(110, Math.min(w, h) * 0.24);
}

function updateMarkerPosition() {
  const camera = sceneEl.camera;
  if (!camera || !markerEl.object3D) return;
  const visible = !!markerEl.object3D.visible;
  if (visible) {
    markerEl.object3D.updateMatrixWorld(true);
    markerEl.object3D.getWorldPosition(tmpWorld);
    tmpWorld.project(camera);
    const sx = (tmpWorld.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-tmpWorld.y * 0.5 + 0.5) * window.innerHeight;
    if (Number.isFinite(sx) && Number.isFinite(sy)) {
      if (!state.hasPose) {
        state.x = sx;
        state.y = sy;
        state.hasPose = true;
      } else {
        state.x += (sx - state.x) * 0.28;
        state.y += (sy - state.y) * 0.28;
      }
    }
  }

  if (visible !== state.markerVisible) {
    state.markerVisible = visible;
    showToast(visible ? 'Hiro認識' : 'Hiro保持');
  }
}

function motionOffset(now, type) {
  const t = now / 1000;
  if (type === 'float') return { x: 0, y: Math.sin(t * 2.8) * 18, rotation: Math.sin(t * 1.7) * 4 };
  if (type === 'swim') return { x: Math.sin(t * 3.2) * 34, y: Math.sin(t * 2.0) * 7, rotation: Math.sin(t * 3.2) * 6 };
  if (type === 'spin') return { x: 0, y: 0, rotation: (t * 120) % 360 };
  if (type === 'jump') return { x: 0, y: -Math.abs(Math.sin(t * 4.0)) * 42, rotation: 0 };
  return { x: 0, y: 0, rotation: 0 };
}

function computeArtRect(now = performance.now()) {
  const v = values();
  const m = motionOffset(now, v.motion);
  const h = state.baseHeight * v.s;
  const w = h * state.imageRatio;
  return {
    visible: !!(state.image && state.hasPose),
    cx: state.x + v.x + m.x,
    cy: state.y - v.h + m.y,
    w,
    h,
    rotation: (v.r + m.rotation) * Math.PI / 180,
  };
}

function drawArt(ctx, rect) {
  if (!rect.visible || !state.image) return;
  ctx.save();
  ctx.translate(rect.cx, rect.cy);
  ctx.rotate(rect.rotation);
  ctx.drawImage(state.image, -rect.w / 2, -rect.h / 2, rect.w, rect.h);
  ctx.restore();
}

function drawOverlay(now) {
  resizeCanvases();
  updateMarkerPosition();
  const w = window.innerWidth;
  const h = window.innerHeight;
  const dpr = artCanvas.width / w;
  artCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  artCtx.clearRect(0, 0, w, h);
  drawArt(artCtx, computeArtRect(now));
}

function getCameraVideo() {
  syncCameraPreview();
  if (cameraPreview.readyState >= 2 && cameraPreview.videoWidth && cameraPreview.videoHeight) {
    return cameraPreview;
  }
  const arVideo = findArVideo();
  if (arVideo && arVideo.readyState >= 2 && arVideo.videoWidth && arVideo.videoHeight) return arVideo;
  return cameraPreview || arVideo || null;
}

function drawVideoCover(ctx, video, w, h) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);
  if (!video || !video.videoWidth || !video.videoHeight) return;
  const vr = video.videoWidth / video.videoHeight;
  const cr = w / h;
  let sw = video.videoWidth, sh = video.videoHeight, sx = 0, sy = 0;
  if (vr > cr) {
    sw = video.videoHeight * cr;
    sx = (video.videoWidth - sw) / 2;
  } else {
    sh = video.videoWidth / cr;
    sy = (video.videoHeight - sh) / 2;
  }
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, w, h);
}

function drawRecordFrame(now) {
  const w = recordCanvas.width;
  const h = recordCanvas.height;
  recordCtx.setTransform(1, 0, 0, 1, 0, 0);
  drawVideoCover(recordCtx, getCameraVideo(), w, h);
  drawArt(recordCtx, computeArtRect(now));
}

function loop(now) {
  drawOverlay(now);
  if (state.recording) drawRecordFrame(now);
  requestAnimationFrame(loop);
}

function supportedMimeType() {
  const options = [
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm',
    'video/mp4'
  ];
  return options.find(type => window.MediaRecorder && MediaRecorder.isTypeSupported(type)) || '';
}

function setRecordUi(mode) {
  if (mode === 'recording') {
    recordStart.disabled = true;
    recordStop.disabled = false;
    recordStatus.textContent = '録画中';
    recordStatus.classList.add('recording');
  } else if (mode === 'ready') {
    recordStart.disabled = false;
    recordStop.disabled = true;
    recordStatus.textContent = '保存できます';
    recordStatus.classList.remove('recording');
  } else {
    recordStart.disabled = false;
    recordStop.disabled = true;
    recordStatus.textContent = '未録画';
    recordStatus.classList.remove('recording');
  }
}

recordStart.addEventListener('click', () => {
  if (!window.MediaRecorder || !recordCanvas.captureStream) {
    alert('このブラウザでは録画に対応していません。Chrome / Edge / Android Chrome で試してください。');
    return;
  }
  if (state.videoUrl) {
    URL.revokeObjectURL(state.videoUrl);
    state.videoUrl = null;
  }
  downloadVideo.href = '#';
  downloadVideo.classList.add('disabled');
  state.chunks = [];
  resizeCanvases();
  drawRecordFrame(performance.now());
  const stream = recordCanvas.captureStream(30);
  const mimeType = supportedMimeType();
  const options = mimeType ? { mimeType } : undefined;
  try {
    state.recorder = new MediaRecorder(stream, options);
  } catch (error) {
    alert('録画を開始できませんでした。別のブラウザで試してください。');
    return;
  }
  state.recorder.ondataavailable = event => {
    if (event.data && event.data.size) state.chunks.push(event.data);
  };
  state.recorder.onstop = () => {
    const type = state.chunks[0]?.type || mimeType || 'video/webm';
    const blob = new Blob(state.chunks, { type });
    state.videoUrl = URL.createObjectURL(blob);
    downloadVideo.href = state.videoUrl;
    downloadVideo.download = type.includes('mp4') ? 'ar-drawing.mp4' : 'ar-drawing.webm';
    downloadVideo.classList.remove('disabled');
    state.recording = false;
    setRecordUi('ready');
  };
  state.recording = true;
  state.recorder.start(200);
  setRecordUi('recording');
});

recordStop.addEventListener('click', () => {
  if (state.recorder && state.recorder.state !== 'inactive') {
    state.recorder.stop();
  }
  state.recording = false;
  recordStop.disabled = true;
});

window.addEventListener('resize', resizeCanvases);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvases, 250));
sceneEl.addEventListener('loaded', () => {
  forceTransparentArCanvas();
  syncCameraPreview();
});
sceneEl.addEventListener('renderstart', () => {
  forceTransparentArCanvas();
  syncCameraPreview();
});
window.setInterval(syncCameraPreview, 500);
window.setTimeout(ensureCameraPreviewFallback, 1800);

updateLabels();
setPreset('fish');
setRecordUi('idle');
requestAnimationFrame(loop);
</script>
</body>
</html>
