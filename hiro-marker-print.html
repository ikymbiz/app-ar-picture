<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hiroマーカー印刷</title>
  <style>
    @page { size: A4 portrait; margin: 0; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f4f6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
    }
    .sheet {
      width: 210mm;
      height: 297mm;
      background: white;
      display: grid;
      place-items: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
      position: relative;
    }
    .marker {
      width: 79mm;
      height: 79mm;
      display: grid;
      place-items: center;
      border: 0;
    }
    .marker img {
      width: 79mm;
      height: 79mm;
      display: block;
    }
    .controls {
      position: fixed;
      left: 16px;
      top: 16px;
      display: flex;
      gap: 8px;
    }
    button, a {
      border: 0;
      border-radius: 999px;
      background: #111827;
      color: white;
      padding: 10px 14px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }
    .note {
      position: absolute;
      bottom: 22mm;
      left: 20mm;
      right: 20mm;
      text-align: center;
      font-size: 12px;
      color: #4b5563;
    }
    @media print {
      body { background: white; }
      .sheet { box-shadow: none; }
      .controls { display: none; }
    }
  </style>
</head>
<body>
  <div class="controls">
    <button onclick="window.print()">印刷する</button>
    <a href="index.html">ARに戻る</a>
  </div>
  <main class="sheet">
    <div class="marker">
      <img src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" alt="Hiro marker">
    </div>
    <div class="note">A4面積の約1/8サイズです。印刷設定は「実際のサイズ」または「100%」にしてください。</div>
  </main>
</body>
</html>
