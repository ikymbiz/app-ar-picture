<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hiroマーカー印刷</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 18mm;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12mm;
    }
    h1 { margin: 0; font-size: 22pt; }
    p { margin: 0; font-size: 11pt; line-height: 1.6; text-align: center; }
    .marker-wrap {
      width: 140mm;
      height: 140mm;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed #cbd5e1;
      padding: 8mm;
    }
    img {
      width: 120mm;
      height: 120mm;
      image-rendering: pixelated;
      display: block;
    }
    .controls { display: flex; gap: 10px; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      background: #111827;
      color: white;
      cursor: pointer;
    }
    .note { max-width: 150mm; color: #374151; }
    @media print {
      body { background: white; }
      .page { margin: 0; padding: 15mm; width: auto; min-height: auto; }
      .controls { display: none; }
      .marker-wrap { border: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Hiroマーカー</h1>
    <div class="marker-wrap">
      <img alt="Hiro AR marker" src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" />
    </div>
    <p class="note">
      この紙を印刷して、ARアプリのカメラに映してください。<br>
      マーカー全体が画面に入るようにすると認識しやすくなります。
    </p>
    <div class="controls">
      <button onclick="window.print()">印刷する</button>
      <button onclick="location.href='index.html'">アプリに戻る</button>
    </div>
  </main>
</body>
</html>
