<!doctype html><html lang="ja"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Hiroマーカー印刷</title><style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f3f4f6;color:#111827}.page{width:210mm;min-height:297mm;margin:0 auto;padding:18mm;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10mm}h1{margin:0;font-size:22pt}p{margin:0;font-size:11pt;line-height:1.6;text-align:center}.marker-wrap{display:flex;align-items:center;justify-content:center;border:1px dashed #cbd5e1;padding:8mm}.marker{width:var(--marker-size,80mm);height:var(--marker-size,80mm);image-rendering:pixelated;display:block}.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center}button,select{border:0;border-radius:999px;padding:10px 16px;font-weight:700;background:#111827;color:white;cursor:pointer}select{background:white;color:#111827;border:1px solid #cbd5e1}.note{max-width:150mm;color:#374151}.size-label{font-size:10pt;color:#374151}@media print{body{background:white}.page{margin:0;padding:15mm;width:auto;min-height:auto}.controls{display:none}.marker-wrap{border:none}}
</style></head><body><main class="page"><h1>Hiroマーカー</h1><div class="controls"><label>印刷サイズ <select id="size"><option value="50mm">小 5cm</option><option value="70mm">中 7cm</option><option value="90mm" selected>標準 9cm</option><option value="120mm">大 12cm</option></select></label><button onclick="window.print()">印刷する</button><button onclick="location.href='index.html'">アプリに戻る</button></div><div class="marker-wrap"><img class="marker" alt="Hiro AR marker" src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"/></div><p class="size-label" id="label">現在のサイズ: 9cm</p><p class="note">小さく印刷できます。認識しにくい時は、明るい場所でマーカー全体をカメラに入れるか、7cm〜9cmに大きくしてください。</p></main><script>const sel=document.getElementById('size'),label=document.getElementById('label');function update(){document.documentElement.style.setProperty('--marker-size',sel.value);label.textContent='現在のサイズ: '+sel.options[sel.selectedIndex].text.replace(/^[^0-9]*/, '')}sel.addEventListener('change',update);update();</script></body></html>
