<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hiroマーカー印刷</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 18mm;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 9mm;
    }
    h1 { margin: 0; font-size: 22pt; }
    p { margin: 0; font-size: 11pt; line-height: 1.6; text-align: center; }
    .buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      background: #111827;
      color: white;
      cursor: pointer;
    }
    .eighth-guide {
      width: 79mm;
      height: 79mm;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed #9ca3af;
      padding: 0;
      background: white;
    }
    .marker {
      width: 79mm;
      height: 79mm;
      display: block;
      image-rendering: pixelated;
    }
    .note { max-width: 155mm; color: #374151; }
    .label {
      font-size: 10pt;
      color: #374151;
      font-weight: 700;
    }
    @page { size: A4; margin: 0; }
    @media print {
      body { background: white; }
      .page {
        width: 210mm;
        min-height: 297mm;
        margin: 0;
        padding: 18mm;
      }
      .buttons, .note.no-print { display: none; }
      .eighth-guide { border: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Hiroマーカー</h1>
    <div class="buttons">
      <button onclick="window.print()">印刷する</button>
      <button onclick="location.href='index.html'">アプリに戻る</button>
    </div>
    <p class="label">Hiro本体: 79mm × 79mm（A4用紙面積の約1/8）</p>
    <div class="eighth-guide">
      <img class="marker" alt="Hiro AR marker" src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" />
    </div>
    <p class="note no-print">印刷設定は「倍率100%」または「実際のサイズ」にしてください。小さめなので、明るい場所でマーカー全体をカメラに入れると認識しやすいです。</p>
  </main>
</body>
</html>
