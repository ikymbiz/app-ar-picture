    }

    button[disabled] { opacity: .55; cursor: not-allowed; }

  <script>
    window.__lastMarkerScreen = { visible: false, hasPose: false, x: 0, y: 0, lastChangeVisible: null };

    AFRAME.registerComponent('screen-marker-tracker', {
      schema: { marker: { type: 'selector' } },
      init: function () {
        this.worldPosition = new THREE.Vector3();
        this.projected = new THREE.Vector3();
        window.addEventListener('reset-ar-pose', () => {
          window.__lastMarkerScreen.hasPose = false;
          window.__lastMarkerScreen.visible = false;
          window.__lastMarkerScreen.lastChangeVisible = false;
          window.dispatchEvent(new CustomEvent('marker-screen-update'));
        });
      },
      tick: function () {
        const markerEl = this.data.marker;
        const scene = this.el.sceneEl;
        const camera = scene && scene.camera;
        if (!markerEl || !markerEl.object3D || !camera) return;

        const state = window.__lastMarkerScreen;
        const nowVisible = !!markerEl.object3D.visible;

        if (nowVisible) {
          markerEl.object3D.updateMatrixWorld(true);
          markerEl.object3D.getWorldPosition(this.worldPosition);
          this.projected.copy(this.worldPosition).project(camera);
          state.x = (this.projected.x * 0.5 + 0.5) * window.innerWidth;
          state.y = (-this.projected.y * 0.5 + 0.5) * window.innerHeight;
          state.hasPose = true;
          state.visible = true;
        } else {
          state.visible = false;
        }

        if (state.lastChangeVisible !== state.visible) {
          state.lastChangeVisible = state.visible;
          window.dispatchEvent(new CustomEvent('marker-visibility-change', { detail: { visible: state.visible, hasPose: state.hasPose } }));
        }
        window.dispatchEvent(new CustomEvent('marker-screen-update'));
      }
    });
  </script>

<body>

  <canvas id="recordCanvas"></canvas>
  <div id="quietToast" class="quiet-toast" aria-live="polite"></div>
  <div id="recordPill" class="record-pill"><span class="record-dot"></span><span id="recordTime">REC 00:00</span></div>

  <button class="menu-button" id="openMenu" type="button" aria-haspopup="dialog" aria-controls="menuModal">menu</button>

    <label class="control">高さ <input id="height" type="range" min="0" max="520" step="2" value="180"><b id="heightVal">180</b></label>
    <label class="control">横 <input id="offsetX" type="range" min="-360" max="360" step="2" value="0"><b id="offsetXVal">0</b></label>
    <label class="control">大きさ <input id="size" type="range" min="0.25" max="4" step="0.05" value="1.0"><b id="sizeVal">1.00</b></label>
    <label class="control">回転 <input id="yaw" type="range" min="-180" max="180" step="1" value="0"><b id="yawVal">0°</b></label>
  </div>

  <div class="modal-backdrop" id="menuModal" role="dialog" aria-modal="true" aria-labelledby="menuTitle">
    <section class="modal">
      <div class="modal-header">
        <div>
          <h1 id="menuTitle">動くお絵かきAR</h1>
          <p>絵は画面上の固定比率レイヤーで表示します。高さ変更やカメラ距離で、絵の縦横比は変わりません。</p>
        </div>
        <button class="close-button" id="closeMenu" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="section">
        <p class="small">絵を選ぶ</p>
        <div class="row">
          <select id="preset" title="絵">
            <option value="fish">魚</option>
            <option value="jellyfish">クラゲ</option>
          </select>
          <label class="btn">自分の絵に変更<input id="file" type="file" accept="image/*"></label>
        </div>
      </div>

      <div class="section">
        <p class="small">動き</p>
        <div class="row">
          <select id="motion" title="動き">
            <option value="float">ふわふわ</option>
            <option value="swim">泳ぐ</option>
            <option value="spin">くるくる</option>
            <option value="jump">ぴょんぴょん</option>
            <option value="still">止める</option>
          </select>
        </div>
      </div>

      <div class="section">
        <p class="small">動画撮影</p>
        <div class="row">
          <button id="startRecording" type="button">録画開始</button>
          <button id="stopRecording" class="danger-button" type="button" disabled>録画停止</button>
          <a id="downloadVideo" class="save-link" download="ar-drawing.webm">動画を保存</a>
        </div>
        <p class="small">動画には、実際のカメラ映像と絵だけを合成します。menu、スライダー、トースト、録画表示は入りません。</p>
      </div>

      <div class="section">
        <div class="row">
          <a class="primary-link" href="hiro-marker-print.html" target="_blank" rel="noopener">Hiroを印刷</a>
          <button class="ghost-button" id="resetPose" type="button">表示位置をリセット</button>
        </div>
        <p class="small">Hiro状態の通知は小さく短時間だけ表示します。見失った後も、最後の位置に絵を残します。</p>
      </div>
    </section>
  </div>

  <a-scene
    embedded
    screen-marker-tracker="marker:#hiroMarker"
    vr-mode-ui="enabled:false"
    renderer="logarithmicDepthBuffer:true; antialias:true; alpha:true"
    arjs="sourceType:webcam; trackingMethod:best; debugUIEnabled:false;"
  >
    <a-marker id="hiroMarker" preset="hiro" smooth="true" smoothCount="8" smoothTolerance="0.01" smoothThreshold="5"></a-marker>
    <a-entity camera></a-entity>
  </a-scene>

<script>
const fishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#1d3557" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M115 260 C170 150 330 150 395 255 C330 365 170 365 115 260 Z" fill="#ffb703"/>
    <path d="M395 255 L472 188 L456 255 L472 322 Z" fill="#fb8500"/>
    <path d="M225 175 L275 92 L302 186 Z" fill="#8ecae6"/>
    <path d="M232 340 L285 420 L305 330 Z" fill="#8ecae6"/>
    <circle cx="165" cy="235" r="14" fill="#1d3557" stroke="none"/>
    <path d="M190 292 C225 318 270 320 310 292" fill="none"/>
    <path d="M255 170 C235 220 235 295 255 345" fill="none" opacity=".55"/>
    <path d="M315 190 C290 235 290 290 315 330" fill="none" opacity=".55"/>
    <circle cx="100" cy="225" r="10" fill="#90e0ef" stroke="none" opacity=".9"/>
    <circle cx="73" cy="184" r="14" fill="#90e0ef" stroke="none" opacity=".75"/>
    <circle cx="55" cy="245" r="8" fill="#90e0ef" stroke="none" opacity=".7"/>
  </g>
</svg>`;

const jellyfishSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="none"/>
  <g stroke="#5b2a86" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M118 240 C130 132 204 78 256 78 C323 78 388 130 398 240 C372 272 329 288 256 288 C184 288 144 272 118 240 Z" fill="#ffafcc"/>
    <path d="M139 250 C170 223 198 223 230 250 C260 280 308 280 376 250" fill="none" opacity=".55"/>
    <circle cx="218" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <circle cx="294" cy="190" r="11" fill="#5b2a86" stroke="none"/>
    <path d="M225 225 C245 238 268 238 288 225" fill="none"/>
    <path d="M175 286 C135 332 164 368 130 422" fill="none"/>
    <path d="M220 290 C190 350 230 382 205 448" fill="none"/>
    <path d="M266 290 C245 350 285 386 265 452" fill="none"/>
    <path d="M312 286 C356 336 320 377 358 432" fill="none"/>
    <path d="M350 278 C405 326 365 368 412 422" fill="none"/>
    <circle cx="106" cy="120" r="12" fill="#bde0fe" stroke="none" opacity=".8"/>
    <circle cx="420" cy="100" r="18" fill="#bde0fe" stroke="none" opacity=".65"/>
    <circle cx="438" cy="205" r="10" fill="#bde0fe" stroke="none" opacity=".75"/>
  </g>
</svg>`;

const artOverlay = document.getElementById('artOverlay');
const preset = document.getElementById('preset');
const motion = document.getElementById('motion');
const height = document.getElementById('height');
const offsetX = document.getElementById('offsetX');
const size = document.getElementById('size');
const yaw = document.getElementById('yaw');
const heightVal = document.getElementById('heightVal');
const offsetXVal = document.getElementById('offsetXVal');
const sizeVal = document.getElementById('sizeVal');
const yawVal = document.getElementById('yawVal');
const fileInput = document.getElementById('file');
const modal = document.getElementById('menuModal');
const openMenu = document.getElementById('openMenu');
const closeMenu = document.getElementById('closeMenu');
const resetPose = document.getElementById('resetPose');
const quietToast = document.getElementById('quietToast');
const recordCanvas = document.getElementById('recordCanvas');
const startRecording = document.getElementById('startRecording');
const stopRecording = document.getElementById('stopRecording');
const downloadVideo = document.getElementById('downloadVideo');
const recordPill = document.getElementById('recordPill');
const recordTime = document.getElementById('recordTime');

const textureCache = {};
let currentImageForRecording = null;
let currentNaturalRatio = 1;
let animationStart = performance.now();
let toastTimer = null;
let mediaRecorder = null;
let recordedChunks = [];
let recording = false;
let recordStartedAt = 0;
let lastOverlayRect = { visible: false, x: 0, y: 0, w: 0, h: 0, rotation: 0 };

function openModal() { modal.classList.add('open'); }
function closeModal() { modal.classList.remove('open'); }
openMenu.addEventListener('click', openModal);
closeMenu.addEventListener('click', closeModal);
modal.addEventListener('click', event => { if (event.target === modal) closeModal(); });
window.addEventListener('keydown', event => { if (event.key === 'Escape') closeModal(); });

function showQuietToast(message) {
  quietToast.textContent = message;
  quietToast.classList.add('show');
  window.clearTimeout(toastTimer);
  toastTimer = window.setTimeout(() => quietToast.classList.remove('show'), 1150);
}

window.addEventListener('marker-visibility-change', event => {
  const { visible, hasPose } = event.detail;
  if (visible) showQuietToast('Hiro 認識中');
  else if (hasPose) showQuietToast('Hiro 最後の位置を保持');
});

function svgToDataUri(svg) {
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

function imageToPngDataUrl(src, maxSize = 1024) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const ratio = img.width / img.height || 1;
      let w, h;
      if (ratio >= 1) {
        w = maxSize;
        h = Math.max(1, Math.round(maxSize / ratio));
      } else {
        h = maxSize;
        w = Math.max(1, Math.round(maxSize * ratio));
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      resolve({ dataUrl: canvas.toDataURL('image/png'), ratio });
    };
    img.onerror = reject;
    img.src = src;
  });
}

function loadImageForRecording(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function setArtworkFromSvg(name, svg) {
  if (!textureCache[name]) {
    textureCache[name] = await imageToPngDataUrl(svgToDataUri(svg));
  }
  await setArtworkTexture(textureCache[name].dataUrl, textureCache[name].ratio);
}

async function setArtworkTexture(src, ratio = 1) {
  currentNaturalRatio = Number.isFinite(ratio) && ratio > 0 ? ratio : 1;
  artOverlay.src = src;
  currentImageForRecording = await loadImageForRecording(src);
  animationStart = performance.now();
  updateOverlay();
}

function values() {
  return {
    x: parseFloat(offsetX.value),
    h: parseFloat(height.value),
    s: parseFloat(size.value),
    r: parseFloat(yaw.value)
  };
}

function updateLabels() {
  const v = values();
  heightVal.textContent = Math.round(v.h);
  offsetXVal.textContent = Math.round(v.x);
  sizeVal.textContent = v.s.toFixed(2);
  yawVal.textContent = `${Math.round(v.r)}°`;
}

function motionOffset(now) {
  const t = (now - animationStart) / 1000;
  const type = motion.value;
  if (type === 'still') return { x: 0, y: 0, rotation: 0 };
  if (type === 'float') return { x: 0, y: Math.sin(t * Math.PI * 2 / 2.2) * 28, rotation: 0 };
  if (type === 'swim') return { x: Math.sin(t * Math.PI * 2 / 2.6) * 42, y: 0, rotation: Math.sin(t * Math.PI * 2 / 2.6) * 5 };
  if (type === 'spin') return { x: 0, y: 0, rotation: (t * 180) % 360 };
  if (type === 'jump') return { x: 0, y: -Math.abs(Math.sin(t * Math.PI * 2 / 1.05)) * 72, rotation: 0 };
  return { x: 0, y: 0, rotation: 0 };
}

function updateOverlay(now = performance.now()) {
  updateLabels();
  const state = window.__lastMarkerScreen;
  if (!state.hasPose || !currentImageForRecording) {
    artOverlay.style.display = 'none';
    lastOverlayRect.visible = false;
    return;
  }

  const v = values();
  const m = motionOffset(now);
  const baseHeight = 220;
  const pixelHeight = baseHeight * v.s;
  const pixelWidth = pixelHeight * currentNaturalRatio;
  const x = state.x + v.x + m.x;
  const y = state.y - v.h + m.y;
  const rotation = v.r + m.rotation;

  artOverlay.style.display = 'block';
  artOverlay.style.left = `${x}px`;
  artOverlay.style.top = `${y}px`;
  artOverlay.style.height = `${pixelHeight}px`;
  artOverlay.style.width = 'auto';
  artOverlay.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;

  lastOverlayRect = {
    visible: true,
    x,
    y,
    w: pixelWidth,
    h: pixelHeight,
    rotation
  };
}

function animationLoop(now) {
  updateOverlay(now);
  if (recording) drawRecordingFrame(now);
  requestAnimationFrame(animationLoop);
}
requestAnimationFrame(animationLoop);

[preset, motion].forEach(input => input.addEventListener('change', async event => {
  if (input === preset) {
    if (event.target.value === 'fish') await setArtworkFromSvg('魚', fishSvg);
    else await setArtworkFromSvg('クラゲ', jellyfishSvg);
  }
  animationStart = performance.now();
  updateOverlay();
}));
[height, offsetX, size, yaw].forEach(input => input.addEventListener('input', updateOverlay));

fileInput.addEventListener('change', async (event) => {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const texture = await imageToPngDataUrl(reader.result);
      await setArtworkTexture(texture.dataUrl, texture.ratio);
    } catch (error) {
      alert('画像を読み込めませんでした。別の画像で試してください。');
    }
  };
  reader.readAsDataURL(file);
});

resetPose.addEventListener('click', () => {
  window.dispatchEvent(new Event('reset-ar-pose'));
  closeModal();
});

function getCameraVideo() {
  const videos = Array.from(document.querySelectorAll('video'));
  return videos.find(v => v.videoWidth > 0 && v.videoHeight > 0) || videos[0] || null;
}

function setupRecordCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const width = Math.max(320, Math.round(window.innerWidth * dpr));
  const heightPx = Math.max(320, Math.round(window.innerHeight * dpr));
  recordCanvas.width = width;
  recordCanvas.height = heightPx;
}

function drawVideoCover(ctx, video, cw, ch) {
  if (!video || !video.videoWidth || !video.videoHeight) {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, cw, ch);
    return;
  }
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  const videoRatio = vw / vh;
  const canvasRatio = cw / ch;
  let sx = 0, sy = 0, sw = vw, sh = vh;
  if (videoRatio > canvasRatio) {
    sw = vh * canvasRatio;
    sx = (vw - sw) / 2;
  } else {
    sh = vw / canvasRatio;
    sy = (vh - sh) / 2;
  }
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cw, ch);
}

function drawRecordingFrame(now = performance.now()) {
  const ctx = recordCanvas.getContext('2d');
  const cw = recordCanvas.width;
  const ch = recordCanvas.height;
  const video = getCameraVideo();
  drawVideoCover(ctx, video, cw, ch);

  updateOverlay(now);
  if (currentImageForRecording && lastOverlayRect.visible) {
    const scaleX = cw / window.innerWidth;
    const scaleY = ch / window.innerHeight;
    const cx = lastOverlayRect.x * scaleX;
    const cy = lastOverlayRect.y * scaleY;
    const w = lastOverlayRect.w * scaleX;
    const h = lastOverlayRect.h * scaleY;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(lastOverlayRect.rotation * Math.PI / 180);
    ctx.drawImage(currentImageForRecording, -w / 2, -h / 2, w, h);
    ctx.restore();
  }

  if (recording) {
    const elapsed = Math.max(0, Math.floor((performance.now() - recordStartedAt) / 1000));
    const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const ss = String(elapsed % 60).padStart(2, '0');
    recordTime.textContent = `REC ${mm}:${ss}`;
  }
}

function supportedMimeType() {
  const candidates = [
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm',
    'video/mp4'
  ];
  if (!window.MediaRecorder) return '';
  return candidates.find(type => MediaRecorder.isTypeSupported(type)) || '';
}

startRecording.addEventListener('click', () => {
  if (!window.MediaRecorder || !recordCanvas.captureStream) {
    alert('このブラウザでは動画録画に対応していません。別のブラウザで試してください。');
    return;
  }
  setupRecordCanvas();
  const mimeType = supportedMimeType();
  const stream = recordCanvas.captureStream(30);
  recordedChunks = [];
  try {
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
  } catch (error) {
    alert('録画を開始できませんでした。別のブラウザで試してください。');
    return;
  }
  mediaRecorder.ondataavailable = event => {
    if (event.data && event.data.size > 0) recordedChunks.push(event.data);
  };
  mediaRecorder.onstop = () => {
    const blobType = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : 'video/webm';
    const blob = new Blob(recordedChunks, { type: blobType });
    const url = URL.createObjectURL(blob);
    downloadVideo.href = url;
    downloadVideo.download = blobType.includes('mp4') ? 'ar-drawing.mp4' : 'ar-drawing.webm';
    downloadVideo.classList.add('ready');
    startRecording.disabled = false;
    stopRecording.disabled = true;
    recordPill.classList.remove('show');
    recording = false;
    showQuietToast('録画を保存できます');
  };
  downloadVideo.classList.remove('ready');
  recording = true;
  recordStartedAt = performance.now();
  recordPill.classList.add('show');
  startRecording.disabled = true;
  stopRecording.disabled = false;
  closeModal();
  drawRecordingFrame();
  mediaRecorder.start(250);
  showQuietToast('録画開始');
});

stopRecording.addEventListener('click', () => {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
});

window.addEventListener('resize', () => {
  updateOverlay();
  if (recording) setupRecordCanvas();
});

window.addEventListener('load', async () => {
  updateLabels();
  await setArtworkFromSvg('魚', fishSvg);
});
</script>
</body>
</html>
